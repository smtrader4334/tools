  }
  .header-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--yellow);
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 700;
  }
  header h1 {
    font-size: 18px;
    font-weight: 900;
    color: var(--white);
    line-height: 1.3;
  }
  header h1 span {
    background: var(--yellow);
    color: var(--navy);
    padding: 0 4px;
    border-radius: 3px;
  }

    display: flex;
    background: var(--navy2);
    padding: 0 16px;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 0;
    font-size: 14px;
    font-weight: 700;
    color: rgba(255,255,255,0.45);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .tab-btn.active {
    color: var(--yellow);
    border-bottom-color: var(--yellow);
  }

  .filter-area {
    background: var(--white);
    padding: 14px 16px;
    border-bottom: 1px solid var(--gray200);
    position: sticky;
    top: 98px;
    z-index: 90;
  }

    position: relative;
    margin-bottom: 10px;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 36px;
    border: 1.5px solid var(--gray200);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    background: var(--gray100);
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--navy); }
  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray500);
    font-size: 15px;
    pointer-events: none;
  }
  .filter-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray500);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .card-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .card-filter-btn {
    padding: 5px 10px;
    border-radius: 20px;
    border: 1.5px solid var(--gray200);
    background: var(--white);
    font-size: 12px;
    font-weight: 500;
    color: var(--gray800);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;

  .card-filter-btn:hover { border-color: var(--navy); }
  .card-filter-btn.active {
    background: var(--navy);
    border-color: var(--navy);
    color: var(--yellow);
  }

    padding: 10px 16px 4px;
    font-size: 12px;
    color: var(--gray500);
    font-weight: 500;
  }
  .result-meta strong { color: var(--navy); }

    padding: 4px 12px 80px;
  }
  .ins-card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    overflow: hidden;
    border-left: 4px solid var(--navy);
    transition: box-shadow 0.2s;

    color: var(--navy);
    border-color: var(--yellow);
    font-weight: 700;

    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    padding: 7px 14px;
    border-radius: 8px;
    background: var(--gray100);
    border: 1.5px solid var(--gray200);
    color: var(--navy);
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .tel-btn:hover { background: var(--navy); color: var(--yellow); }

    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .badge-item {
    display: flex;
    align-items: center;
    gap: 3px;

  .tab-panel.active { display: block; }

    font-size: 11px;
    padding: 14px 16px;
    line-height: 1.8;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;

function setCardFilter(card, btn) {
  activeCardFilter = card;

  applyFilter();
}

  btn.classList.add("active");
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById(`panel-${tab}`).classList.add("active");
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const listId = `list-${currentTab}`;
  const cards = document.querySelectorAll(`#${listId} .ins-card`);
  let visible = 0;

  cards.forEach(card => {
    const name = card.dataset.name || "";
    const cardList = (card.dataset.cards || "").toLowerCase();
    const matchSearch = !q || name.includes(q);
    const matchCard = !activeCardFilter || cardList.includes(activeCardFilter.toLowerCase());

    if (matchSearch && matchCard) {
      card.classList.remove("hidden");
      visible++;
      // 카드사 태그 하이라이트
      card.querySelectorAll(".ctag").forEach(tag => {
        if (activeCardFilter && tag.textContent.includes(activeCardFilter)) {
          tag.classList.add("match");
        } else {
          tag.classList.remove("match");
        }
      });
    } else {
      card.classList.add("hidden");
    }
  });

  updateResultMeta(visible, cards.length);
}

function updateResultMeta(visible, total) {
  const meta = document.getElementById("resultMeta");
  const label = currentTab === "life" ? "생명보험" : "손해보험";
  if (visible === undefined) {
    const t = document.querySelectorAll(`#list-${currentTab} .ins-card`).length;
    meta.innerHTML = `<strong>${label}</strong> · 전체 ${t}개사`;
  } else {
    meta.innerHTML = `<strong>${label}</strong> · ${visible} / ${total}개사 표시`;
  }
}

/* ── 카드 렌더링 ── */
function renderCards(type, data) {
  const list = document.getElementById(`list-${type}`);

  data.forEach(item => {
    const cardStr = item.cards.join(",");
    const div = document.createElement("div");
    div.className = "ins-card";
    div.dataset.name = item.name.toLowerCase();
    div.dataset.cards = cardStr.toLowerCase();

    const initBadge = item.initial === "O"
      ? `<span class="badge badge-ok">초회 ✓</span>`
      : `<span class="badge badge-no">초회 ✗</span>`;
    const contBadge = item.continue === "O"
      ? `<span class="badge badge-ok">계속 ✓</span>`
      : `<span class="badge badge-no">계속 ✗</span>`;

    const cardTags = item.cards.map(c =>
      `<span class="ctag">${c}</span>`
    ).join("");

    const telHtml = item.tel
      ? `<a href="tel:${item.tel}" class="tel-btn">📞 ${item.tel}</a>`
      : item.telNote
      ? `<span style="font-size:12px;color:var(--gray500);">☎ ${item.telNote}</span>`
      : "";

    const continueMemoHtml = type === "nonlife" && item.continueMemo
      ? `<div class="info-row"><span class="info-key">계속분</span><span class="info-val">${item.continueMemo}</span></div>`
      : "";

    div.innerHTML = `
      <div class="card-header">
        <span class="card-name">${item.name}</span>
        <div class="badges">${initBadge}${contBadge}</div>
      </div>
      <div class="card-body">
        <div class="divider"></div>
        <div class="info-row">
          <span class="info-key">가능상품</span>
          <span class="info-val">${item.product}</span>
        </div>
        ${continueMemoHtml}
        <div class="info-row">
          <span class="info-key">사용카드</span>
          <span class="info-val">
            <div class="card-tags">${cardTags}</div>
            ${item.cardNote ? `<div style="font-size:11px;color:var(--gray500);margin-top:4px;">※ ${item.cardNote}</div>` : ""}
          </span>
        </div>
        <div class="info-row">
          <span class="info-key">명의범위</span>
          <span class="info-val">${item.scope}</span>
        </div>
        <div style="margin-top:10px;">${telHtml}</div>
      </div>
    `;

    list.appendChild(div);
  });
}

/* 빈 상태 감지 */
function checkEmpty() {
  ["life", "nonlife"].forEach(type => {
    const list = document.getElementById(`list-${type}`);
    const existing = list.querySelector(".empty-state");
    const visible = list.querySelectorAll(".ins-card:not(.hidden)").length;
    if (visible === 0 && !existing) {
      const e = document.createElement("div");
      e.className = "empty-state";
      e.innerHTML = `<div class="icon">🔍</div><p>검색 결과가 없습니다</p>`;
      list.appendChild(e);
    } else if (visible > 0 && existing) {
      existing.remove();
    }
  });
}

const origApply = applyFilter;
window.applyFilter = function() { origApply(); checkEmpty(); updateResultMeta(...arguments); };

init();
</script>
</body>
</html>
