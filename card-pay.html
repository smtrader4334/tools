<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보험 카드납 비교표</title>
<meta property="og:title" content="보험 카드납 비교표">
<meta property="og:description" content="생명보험·손해보험 회사별 카드납 가능 여부 한눈에 비교">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --yellow: #F5C518;
  --navy: #1A1A2E;
  --navy2: #2D2D4E;
  --white: #FFFFFF;
  --gray100: #F7F7F7;
  --gray200: #E8E8E8;
  --gray400: #BBBBBB;
  --gray500: #888888;
  --gray800: #333333;
  --red: #D93025;
  --green: #1A7A4A;
  --teal: #00897B;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--gray100); color: var(--gray800); min-height: 100vh; }

/* 헤더 */
header {
  background: var(--navy);
  padding: 18px 16px 14px;
  position: sticky; top: 0; z-index: 200;
}
.header-eyebrow { font-size: 10px; letter-spacing: 2px; color: var(--yellow); font-weight: 700; margin-bottom: 3px; }
header h1 { font-size: 17px; font-weight: 900; color: #fff; }
header h1 span { background: var(--yellow); color: var(--navy); padding: 0 4px; border-radius: 3px; }

/* 탭 */
.tab-bar { display: flex; background: var(--navy2); }
.tab-btn {
  flex: 1; padding: 11px 0; font-size: 14px; font-weight: 700;
  color: rgba(255,255,255,0.4); background: none; border: none;
  border-bottom: 3px solid transparent; cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif; transition: all .2s;
}
.tab-btn.active { color: var(--yellow); border-bottom-color: var(--yellow); }

/* 필터 바 */
.filter-bar {
  background: #fff; padding: 12px 14px;
  display: flex; gap: 8px;
  border-bottom: 1px solid var(--gray200);
  position: sticky; top: 88px; z-index: 150;
}
.filter-trigger {
  flex: 1; display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-radius: 10px;
  border: 1.5px solid var(--gray200); background: var(--gray100);
  font-size: 14px; font-weight: 600; color: var(--gray800);
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: border-color .2s;
}
.filter-trigger.selected { border-color: var(--navy); background: var(--navy); color: var(--yellow); }
.filter-trigger .arrow { font-size: 11px; opacity: .5; }
.filter-trigger.selected .arrow { opacity: 1; }

/* 결과 메타 */
.result-meta { padding: 8px 14px 2px; font-size: 12px; color: var(--gray500); font-weight: 500; }
.result-meta strong { color: var(--navy); }

/* 카드 목록 */
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.card-list { padding: 6px 12px 80px; }

.ins-card {
  background: #fff; border-radius: 12px;
  box-shadow: 0 2px 10px rgba(26,26,46,.09);
  margin-bottom: 10px; overflow: hidden;
  border-left: 4px solid var(--navy);
}
.ins-card.hidden { display: none; }

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px 8px;
}
.card-name { font-size: 16px; font-weight: 900; color: var(--navy); }
.badges { display: flex; gap: 4px; }
.badge { font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 5px; }
.badge-ok { background: #E6F4ED; color: var(--green); }
.badge-no { background: #FDE8E8; color: var(--red); }

.card-body { padding: 0 14px 14px; }
.divider { height: 1px; background: var(--gray200); margin-bottom: 8px; }
.info-row { display: flex; gap: 6px; margin-top: 6px; font-size: 13px; align-items: flex-start; }
.info-key { min-width: 66px; font-size: 11px; font-weight: 700; color: var(--gray500); padding-top: 2px; flex-shrink: 0; }
.info-val { color: var(--gray800); font-weight: 500; line-height: 1.5; }

.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
.ctag {
  font-size: 11px; padding: 3px 8px; border-radius: 5px;
  background: var(--gray100); border: 1px solid var(--gray200);
  color: var(--gray800); font-weight: 500;
}
.ctag.match { background: var(--yellow); border-color: var(--yellow); color: var(--navy); font-weight: 700; }

.tel-link {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 10px; padding: 7px 14px; border-radius: 8px;
  background: var(--gray100); border: 1.5px solid var(--gray200);
  color: var(--navy); font-size: 13px; font-weight: 700;
  text-decoration: none;
}

/* ── 바텀시트 ── */
.sheet-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 900;
}
.sheet-overlay.open { display: block; }
.bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-radius: 20px 20px 0 0;
  z-index: 1000; max-height: 78vh;
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .3s ease;
}
.bottom-sheet.open { transform: translateY(0); }

.sheet-handle { width: 40px; height: 4px; background: var(--gray200); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
.sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 10px; border-bottom: 1px solid var(--gray200); flex-shrink: 0;
}
.sheet-title { font-size: 15px; font-weight: 900; color: var(--navy); }
.sheet-reset { font-size: 13px; font-weight: 600; color: var(--gray500); cursor: pointer; background: none; border: none; font-family: 'Noto Sans KR', sans-serif; }

.sheet-list { overflow-y: auto; flex: 1; padding: 6px 0 20px; }
.sheet-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px; cursor: pointer; border-bottom: 1px solid var(--gray100);
  transition: background .1s;
}
.sheet-item:active { background: var(--gray100); }
.sheet-item-label { font-size: 16px; font-weight: 600; color: var(--gray800); }
.sheet-item.selected .sheet-item-label { color: var(--navy); font-weight: 900; }

/* 라디오 커스텀 */
.radio-circle {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--gray400); background: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.sheet-item.selected .radio-circle {
  border-color: var(--teal); background: var(--teal);
}
.radio-circle::after {
  content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff;
  display: none;
}
.sheet-item.selected .radio-circle::after { display: block; }

.empty-state { text-align: center; padding: 60px 20px; color: var(--gray500); font-size: 14px; }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">TODAY'S INSU</div>
  <h1>카드납 비교표 <span>한눈에!</span></h1>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('life',this)">🏦 생명보험</button>
  <button class="tab-btn" onclick="switchTab('nonlife',this)">🔥 손해보험</button>

<div class="tab-panel active" id="panel-life"><div class="card-list" id="list-life"></div></div>

<!-- 바텀시트 -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title" id="sheet-title">선택하세요</span>
    <button class="sheet-reset" onclick="resetSheet()">초기화</button>

  { name:"KB손보", initial:"O", cont:"O", contMemo:"계속분: 설계사 수납", tel:null, cards:["KB","롯데","BC","삼성","신한","우리","농협","씨티","현대","하나"], cardNote:null, scope:"계약자, 배우자, 직계가족" },

  { name:"롯데손보", initial:"O", cont:"O", contMemo:"계속분: 설계사 수납", tel:null, cards:["BC","KB","농협","롯데","삼성","신한","씨티","하나","현대"], cardNote:null, scope:"계약자, 배우자, 직계가족" },
  { name:"메리츠화재", initial:"O", cont:"O", contMemo:"카드 자동이체 (콜센터 1566-7711)", tel:"1566-7711", cards:["BC","KB","롯데","삼성","신한","하나","현대","NH","우리"], cardNote:null, scope:"계약자, 배우자, 직계가족" },
  { name:"삼성화재", initial:"O", cont:"O", contMemo:"계속분: 설계사 수납", tel:null, cards:["KB","롯데","BC","삼성","신한","하나","외환","농협","씨티","현대","광주","전북","수협"], cardNote:"하나SK·제주·해외카드 포함", scope:"계약자" },
  { name:"하나손보", initial:"O", cont:"O", contMemo:"－", tel:null, cards:["KB","롯데","BC","삼성","신한","우리","하나","외환","농협","씨티","현대"], cardNote:"하나SK·갤러리아카드 포함", scope:"계약자" },
  { name:"한화손보", initial:"O", cont:"O", contMemo:"카드 자동이체 (고객센터/지점 내방, 콜센터 불가)", tel:null, cards:["KB","BC","신한","농협","현대","하나","롯데","삼성"], cardNote:"삼성체크카드 자동이체 불가", scope:"계약자, 피보험자" },
  { name:"현대해상", initial:"O", cont:"O", contMemo:"계속분: 설계사 수납", tel:null, cards:["KB","롯데","BC","삼성","신한","농협","씨티","현대","하나"], cardNote:null, scope:"계약자, 피보험자, 직계존비속, 형제자매" },
  { name:"흥국화재", initial:"O", cont:"O", contMemo:"카드 자동이체 (콜센터 1688-1688)", tel:"1688-1688", cards:["BC","하나","KB","삼성","신한","롯데","현대","농협"], cardNote:null, scope:"계약자, 배우자, 직계가족" }
];

const majorCards = ["KB","삼성","신한","현대","롯데","BC","하나","농협","국민","우리","씨티","NH"];

let currentTab = "life";
let selectedIns = null;   // 선택된 보험사
let selectedCard = null;  // 선택된 카드사
let currentSheetType = null; // 'ins' | 'card'

/* ── 초기화 ── */
function init() {
  renderCards("life", lifeData);
  renderCards("nonlife", nonlifeData);
  applyFilter();
}

function getData() { return currentTab === "life" ? lifeData : nonlifeData; }

/* ── 카드 렌더링 ── */
function renderCards(type, data) {
  const list = document.getElementById(`list-${type}`);
  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "ins-card";
    div.dataset.name = item.name;

    const initBadge = item.initial === "O"
      ? `<span class="badge badge-ok">초회 ✓</span>`
      : `<span class="badge badge-no">초회 ✗</span>`;
    const contBadge = item.cont === "O"
      ? `<span class="badge badge-ok">계속 ✓</span>`
      : `<span class="badge badge-no">계속 ✗</span>`;

    const tags = item.cards.map(c => `<span class="ctag">${c}</span>`).join("");
    const contRow = (type === "nonlife" && item.contMemo)
      ? `<div class="info-row"><span class="info-key">계속분</span><span class="info-val">${item.contMemo}</span></div>` : "";
    const telHtml = item.tel
      ? `<a href="tel:${item.tel}" class="tel-link">📞 ${item.tel}</a>`
      : (item.telNote ? `<span style="font-size:12px;color:var(--gray500)">☎ ${item.telNote}</span>` : "");

    div.innerHTML = `
      <div class="card-header">
        <span class="card-name">${item.name}</span>
        <div class="badges">${initBadge}${contBadge}</div>
      </div>
      <div class="card-body">
        <div class="divider"></div>
        <div class="info-row"><span class="info-key">가능상품</span><span class="info-val">${item.product}</span></div>
        ${contRow}
        <div class="info-row"><span class="info-key">사용카드</span><span class="info-val">
          <div class="card-tags">${tags}</div>
          ${item.cardNote ? `<div style="font-size:11px;color:var(--gray500);margin-top:4px">※ ${item.cardNote}</div>` : ""}
        </span></div>
        <div class="info-row"><span class="info-key">명의범위</span><span class="info-val">${item.scope}</span></div>
        <div style="margin-top:8px">${telHtml}</div>
      </div>`;
    list.appendChild(div);
  });
}

/* ── 필터 적용 ── */
function applyFilter() {
  const listId = `list-${currentTab}`;
  const cards = document.querySelectorAll(`#${listId} .ins-card`);
  let visible = 0;

  cards.forEach(el => {
    const name = el.dataset.name;
    const data = getData().find(d => d.name === name);
    if (!data) return;

    const matchIns = !selectedIns || name === selectedIns;
    const matchCard = !selectedCard || data.cards.includes(selectedCard);

    if (matchIns && matchCard) {
      el.classList.remove("hidden"); visible++;
      el.querySelectorAll(".ctag").forEach(tag => {
        tag.classList.toggle("match", selectedCard && tag.textContent === selectedCard);
      });
    } else {
      el.classList.add("hidden");
    }
  });

  // 결과 메타
  const label = currentTab === "life" ? "생명보험" : "손해보험";
  const total = cards.length;
  document.getElementById("resultMeta").innerHTML =
    `<strong>${label}</strong> · ${visible} / ${total}개사`;

  // 빈 상태
  const list = document.getElementById(listId);
  let empty = list.querySelector(".empty-state");
  if (visible === 0 && !empty) {
    empty = document.createElement("div");
    empty.className = "empty-state";
    empty.textContent = "해당하는 보험사가 없습니다";
    list.appendChild(empty);
  } else if (visible > 0 && empty) empty.remove();

  // 버튼 상태 업데이트
  updateFilterBtns();
}

function updateFilterBtns() {
  const insBtn = document.getElementById("btn-ins");
  const cardBtn = document.getElementById("btn-card");
  document.getElementById("ins-label").textContent = selectedIns || "보험사 선택";
  document.getElementById("card-label").textContent = selectedCard || "카드사 선택";
  insBtn.classList.toggle("selected", !!selectedIns);
  cardBtn.classList.toggle("selected", !!selectedCard);
}

/* ── 탭 전환 ── */
function switchTab(tab, btn) {
  currentTab = tab;
  selectedIns = null; selectedCard = null;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById(`panel-${tab}`).classList.add("active");
  applyFilter();
}

/* ── 바텀시트 ── */
function openSheet(type) {
  currentSheetType = type;
  const overlay = document.getElementById("overlay");
  const sheet = document.getElementById("bottom-sheet");
  const listEl = document.getElementById("sheet-list");
  listEl.innerHTML = "";

  if (type === "ins") {
    document.getElementById("sheet-title").textContent = "보험사 선택";
    getData().forEach(item => {
      const el = makeSheetItem(item.name, selectedIns === item.name, () => {
        selectedIns = item.name; closeSheet(); applyFilter();
      });
      listEl.appendChild(el);
    });
  } else {
    document.getElementById("sheet-title").textContent = "카드사 선택";
    majorCards.forEach(c => {
      const el = makeSheetItem(c, selectedCard === c, () => {
        selectedCard = c; closeSheet(); applyFilter();
      });
      listEl.appendChild(el);
    });
  }

  overlay.classList.add("open");
  requestAnimationFrame(() => sheet.classList.add("open"));
}

function makeSheetItem(label, isSelected, onClick) {
  const el = document.createElement("div");
  el.className = "sheet-item" + (isSelected ? " selected" : "");
  el.innerHTML = `<span class="sheet-item-label">${label}</span><div class="radio-circle"></div>`;
  el.addEventListener("click", onClick);
  return el;
}

function closeSheet() {
  const sheet = document.getElementById("bottom-sheet");
  const overlay = document.getElementById("overlay");
  sheet.classList.remove("open");
  overlay.classList.remove("open");
}

function resetSheet() {
  if (currentSheetType === "ins") selectedIns = null;
  else selectedCard = null;
  closeSheet();
  applyFilter();
}

init();
</script>
</body>
</html>
