<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌏 발리 · 부산 날씨</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#060a14;color:#fff;font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;max-width:480px;margin:0 auto;overflow:hidden}

.header{display:flex;justify-content:space-between;align-items:center;padding:13px 16px 9px}
.h-title{font-size:16px;font-weight:800;letter-spacing:-0.5px}
.h-sub{font-size:10px;color:#475569;margin-top:1px}
.h-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:6px 14px;color:#94a3b8;font-size:12px;cursor:pointer}
#updateTime{font-size:9px;color:#1e3a5f;text-align:right;margin-top:2px}

.cards{padding:0 12px 10px;display:flex;flex-direction:column;gap:9px}

/* 카드: JS가 height 직접 주입. stats는 항상 하단 절대고정 */
.card{
  position:relative;
  border-radius:20px;overflow:hidden;
  flex-shrink:0;
}
.card-body{
  position:absolute;
  top:0;left:0;right:0;bottom:102px; /* stats 높이만큼 제외 */
  padding:12px 18px 4px;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.city-country{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.city-name{font-size:26px;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-top:1px}
.city-tag{font-size:10px;color:rgba(255,255,255,.33);margin-top:2px}
.wx-icon{font-size:40px;line-height:1;text-align:right}
.wx-text{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;text-align:right;max-width:72px;line-height:1.3}
.card-date{font-size:10px;color:rgba(255,255,255,.3);margin-top:5px;flex-shrink:0}
.clock{flex:1;display:flex;align-items:center;min-height:0}
.c-hm{font-size:48px;font-weight:700;font-family:monospace;letter-spacing:2px;line-height:1;color:#f1f5f9}
.c-sec{font-size:24px;font-weight:400;font-family:monospace;line-height:1;margin-bottom:3px}
.daynight{display:inline-block;font-size:9px;padding:2px 6px;border-radius:5px;margin-left:5px;font-weight:600;vertical-align:middle}

/* stats: 항상 카드 맨 아래 고정 */
.stats-wrap{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:8px 18px 10px;
  background:rgba(0,0,0,.38);
  border-top:1px solid rgba(255,255,255,.06);
}
.stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.05)}
.s-lbl{font-size:9px;color:rgba(255,255,255,.32);letter-spacing:.4px;margin-bottom:3px;text-align:center}
.s-val{font-size:14px;font-weight:700;color:#f1f5f9;text-align:center}
.s-sub{font-size:9px;color:rgba(255,255,255,.28);margin-top:1px;text-align:center}
.s-val.sm{font-size:12px}
.skel{background:rgba(255,255,255,.07);border-radius:3px;animation:sk 1.4s ease-in-out infinite}
@keyframes sk{0%,100%{opacity:.4}50%{opacity:.9}}
.err-msg{font-size:11px;color:rgba(255,80,80,.75);text-align:center;padding:6px 0}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="h-title">🌏 발리 · 부산</div>
    <div class="h-sub">발리 UTC+8 &nbsp;·&nbsp; 부산 UTC+9 &nbsp;·&nbsp; 시차 1시간</div>
  </div>
  <div style="text-align:right">
    <button class="h-btn" onclick="refresh()">↻ 갱신</button>
    <div id="updateTime"></div>
  </div>
</div>
<div class="cards" id="cards"></div>

<script>
const KEY='b917650c54c74b6a8cc92746262806';
const CITIES=[
  {id:'bali',  name:'발리',country:'인도네시아',tz:'Asia/Makassar',flag:'🇮🇩',
   q:'-8.6705,115.2126',tagline:'신들의 섬 · 덴파사르 · WITA',
   accent:'#fb923c',sec:'#fdba74',
   bg:'linear-gradient(160deg,#2a0d02 0%,#7c2d12 50%,#2a0d02 100%)',
   bdr:'rgba(234,88,12,.3)',sdw:'rgba(194,65,12,.3)'},
  {id:'busan', name:'부산',country:'대한민국', tz:'Asia/Seoul',   flag:'🇰🇷',
   q:'35.1796,129.0756', tagline:'해운대 · 광안리 · 한국 제2도시',
   accent:'#60a5fa',sec:'#93c5fd',
   bg:'linear-gradient(160deg,#071b3e 0%,#0a2e60 50%,#071b3e 100%)',
   bdr:'rgba(59,130,246,.3)',sdw:'rgba(37,99,235,.3)'},
];

/* ── 카드 높이 JS 직접 계산 ── */
function sizeCards(){
  const headerH=document.querySelector('.header').offsetHeight;
  const available=window.innerHeight-headerH-10-9; // padBottom + gap
  const h=Math.max(Math.floor(available/2),190);
  document.querySelectorAll('.card').forEach(c=>c.style.height=h+'px');
}
window.addEventListener('resize',sizeCards);

function wxEmoji(c,d){
  if(c===1000)return d?'☀️':'🌙';if(c<=1009)return d?'⛅':'🌤️';
  if([1030,1135,1147].includes(c))return'🌫️';
  if(c>=1063&&c<=1072)return'🌦️';if(c===1087||(c>=1273&&c<=1282))return'⛈️';
  if(c>=1114&&c<=1117)return'❄️';if(c>=1150&&c<=1153)return'🌦️';
  if(c>=1168&&c<=1171)return'🌨️';if(c>=1180&&c<=1195)return'🌧️';
  if(c>=1198&&c<=1225)return'🌨️';if(c>=1240&&c<=1246)return'🌧️';
  if(c>=1249&&c<=1264)return'🌨️';return'🌡️';
}
const WDIR={N:'북',NNE:'북북동',NE:'북동',ENE:'동북동',E:'동',ESE:'동남동',SE:'남동',SSE:'남남동',S:'남',SSW:'남남서',SW:'남서',WSW:'서남서',W:'서',WNW:'서북서',NW:'북서',NNW:'북북서'};
const UVL=['','낮음','낮음','보통','보통','보통','높음','높음','매우높음','매우높음','매우높음','위험'];
function uvc(v){return v<=2?'#4ade80':v<=5?'#facc15':v<=7?'#f97316':v<=10?'#ef4444':'#a855f7'}

let cache={},clockId=null;
function initClock(){if(clockId)clearInterval(clockId);tick();clockId=setInterval(tick,1000);}
function tick(){
  const now=new Date();
  CITIES.forEach(c=>{
    const hm=document.getElementById('hm_'+c.id),sc=document.getElementById('sc_'+c.id),dt=document.getElementById('dt_'+c.id);
    if(!hm)return;
    const p={};
    new Intl.DateTimeFormat('en-US',{timeZone:c.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})
      .formatToParts(now).forEach(({type,value})=>p[type]=value);
    hm.textContent=`${p.hour}:${p.minute}`;sc.textContent=`:${p.second}`;
    if(dt)dt.textContent=now.toLocaleDateString('ko-KR',{timeZone:c.tz,year:'numeric',month:'long',day:'numeric',weekday:'short'});
  });
}

async function wFetch(city){
  const res=await fetch(`https://api.weatherapi.com/v1/current.json?key=${KEY}&q=${city.q}&lang=ko&aqi=no`);
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`오류 ${res.status}`);}
  return res.json();
}
function refresh(){cache={};loadWeather();}
async function loadWeather(){
  const now=Date.now(),TTL=30*60*1000;
  if(CITIES.every(c=>cache[c.id]&&(now-cache[c.id].ts)<TTL)){renderCards({});return;}
  renderCards(null);
  const errs={};
  await Promise.all(CITIES.map(async c=>{
    try{if(cache[c.id]&&(now-cache[c.id].ts)<TTL)return;cache[c.id]={data:await wFetch(c),ts:Date.now()};}
    catch(e){errs[c.id]=e.message;}
  }));
  renderCards(errs);
  const ts=Math.max(...CITIES.map(c=>cache[c.id]?.ts||0));
  if(ts>0)document.getElementById('updateTime').textContent=
    `${new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} 기준`;
}

function renderCards(errs){
  const el=document.getElementById('cards');
  el.innerHTML='';
  CITIES.forEach(c=>el.appendChild(makeCard(c,errs)));
  sizeCards(); // JS로 높이 강제 적용
  tick();
}

function makeCard(city,errs){
  const loading=errs===null,err=errs?errs[city.id]:null;
  const cur=cache[city.id]?.data?.current;
  const isDay=cur?cur.is_day===1:true,code=cur?.condition?.code||1000;
  const icon=cur?wxEmoji(code,isDay):'',wxTxt=cur?cur.condition.text:'';
  const dayBadge=cur!=null?`<span class="daynight" style="background:${isDay?'rgba(251,191,36,.18)':'rgba(99,102,241,.18)'};color:${isDay?'#fbbf24':'#818cf8'}">${isDay?'낮':'밤'}</span>`:'';
  let stats='';
  if(loading){
    stats=`<div class="stats4">${[0,1,2,3].map(()=>`<div><div class="skel" style="height:8px;margin-bottom:4px"></div><div class="skel" style="height:13px"></div></div>`).join('')}</div>`;
  }else if(err){
    stats=`<div class="err-msg">⚠️ ${err}</div>`;
  }else if(cur){
    const t=Math.round(cur.temp_c),f=Math.round(cur.feelslike_c),hum=cur.humidity;
    const ws=Math.round(cur.wind_kph),wd=WDIR[cur.wind_dir]||cur.wind_dir;
    const wg=cur.gust_kph?Math.round(cur.gust_kph):null;
    const uv=cur.uv||0,vis=Math.round(cur.vis_km);
    const dew=cur.dewpoint_c!=null?Math.round(cur.dewpoint_c)+'°C':'-';
    stats=`
    <div class="stats4">
      <div><div class="s-lbl">기온</div><div class="s-val">${t}°C</div><div class="s-sub">체감 ${f}°</div></div>
      <div><div class="s-lbl">습도</div><div class="s-val">${hum}%</div></div>
      <div><div class="s-lbl">바람</div><div class="s-val">${ws}㎞/h</div><div class="s-sub">${wd}${wg?`·${wg}`:''}</div></div>
      <div><div class="s-lbl">자외선</div><div class="s-val" style="color:${uvc(uv)}">${uv}</div><div class="s-sub">${UVL[Math.min(Math.floor(uv),11)]}</div></div>
    </div>
    <div class="stats3">
      <div><div class="s-lbl">가시거리</div><div class="s-val sm">${vis}㎞</div></div>
      <div><div class="s-lbl">이슬점</div><div class="s-val sm">${dew}</div></div>
      <div><div class="s-lbl">강수(1h)</div><div class="s-val sm">${cur.precip_mm}㎜</div></div>
    </div>`;
  }
  const card=document.createElement('div');
  card.className='card';
  card.style.cssText=`background:${city.bg};border:1px solid ${city.bdr};box-shadow:0 10px 32px ${city.sdw}`;
  card.innerHTML=`
  <div class="card-body">
    <div class="card-top">
      <div>
        <div class="city-country" style="color:${city.accent}">${city.flag} ${city.country}</div>
        <div class="city-name">${city.name}${dayBadge}</div>
        <div class="city-tag">${city.tagline}</div>
      </div>
      <div><div class="wx-icon">${icon}</div><div class="wx-text">${wxTxt}</div></div>
    </div>
    <div class="card-date" id="dt_${city.id}"></div>
    <div class="clock">
      <span class="c-hm" id="hm_${city.id}">--:--</span>
      <span class="c-sec" style="color:${city.sec}" id="sc_${city.id}">:--</span>
    </div>
  </div>
  <div class="stats-wrap">${stats}</div>`;
  return card;
}

initClock();
loadWeather();
</script>
</body>
</html>
