<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>рҹҢҸ л¶ҖмӮ° В· л°ңлҰ¬ лӮ м”Ё</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:#060a14;color:#fff;
  font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  min-height:100vh;max-width:480px;margin:0 auto;
}

/* в”Җв”Җ Setup в”Җв”Җ */
#setupScreen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:40px 28px;text-align:center;
}
.setup-logo{font-size:52px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.setup-title{font-size:24px;font-weight:900;letter-spacing:-0.5px;margin-bottom:8px}
.setup-desc{font-size:13px;color:#64748b;line-height:1.7;margin-bottom:32px}

.input-wrap{position:relative;width:100%;margin-bottom:12px}
.input-wrap input{
  width:100%;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.12);border-radius:14px;
  padding:15px 44px 15px 16px;color:#fff;font-size:14px;
  letter-spacing:1px;outline:none;transition:border .2s;
}
.input-wrap input:focus{border-color:rgba(96,165,250,0.5)}
.input-wrap input::placeholder{color:#475569;letter-spacing:0}
.toggle-vis{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#64748b;cursor:pointer;font-size:16px;
}

.btn-start{
  width:100%;background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border:none;border-radius:14px;padding:15px;color:#fff;
  font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px;
  box-shadow:0 8px 24px rgba(37,99,235,0.4);
}
.setup-footer{font-size:12px;color:#334155;line-height:1.8}
.setup-footer a{color:#60a5fa;text-decoration:none}

/* в”Җв”Җ Main в”Җв”Җ */
#mainApp{display:none}
#mainApp.on{display:block}

/* Header */
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 18px 14px;
}
.h-title{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.h-sub{font-size:11px;color:#475569;margin-top:2px}
.h-btns{display:flex;gap:8px}
.h-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:7px 12px;color:#94a3b8;font-size:12px;cursor:pointer;
  white-space:nowrap;
}

/* Cards */
.cards{padding:0 14px 28px;display:flex;flex-direction:column;gap:16px}

.card{border-radius:24px;overflow:hidden}

.card-body{padding:20px 22px 8px}

.card-top{display:flex;justify-content:space-between;align-items:flex-start}
.city-country{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.city-name{font-size:34px;font-weight:900;letter-spacing:-1px;line-height:1.1;margin-top:2px}
.city-tag{font-size:11px;color:rgba(255,255,255,0.33);margin-top:3px}

.wx-icon{font-size:54px;line-height:1;text-align:right}
.wx-text{font-size:11px;color:rgba(255,255,255,0.45);margin-top:3px;text-align:right;max-width:80px}

.card-date{font-size:12px;color:rgba(255,255,255,0.33);margin-top:8px}

.clock{display:flex;align-items:flex-end;gap:2px;margin:8px 0 16px}
.c-hm{font-size:58px;font-weight:700;font-family:monospace;letter-spacing:2px;line-height:1;color:#f1f5f9}
.c-sec{font-size:29px;font-weight:400;font-family:monospace;line-height:1;margin-bottom:4px}

/* Stats */
.stats-wrap{
  padding:14px 22px;background:rgba(0,0,0,0.3);
  border-top:1px solid rgba(255,255,255,0.05);
}
.stats4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05)}
.s-lbl{font-size:10px;color:rgba(255,255,255,0.32);letter-spacing:.5px;margin-bottom:4px;text-align:center}
.s-val{font-size:15px;font-weight:700;color:#f1f5f9;text-align:center}
.s-sub{font-size:9px;color:rgba(255,255,255,0.28);margin-top:2px;text-align:center}
.s-val.sm{font-size:13px}

/* Skeleton */
.skel{background:rgba(255,255,255,0.07);border-radius:4px;
  animation:sk 1.4s ease-in-out infinite}
@keyframes sk{0%,100%{opacity:.4}50%{opacity:.9}}

.err-msg{font-size:12px;color:rgba(255,80,80,0.7);text-align:center;padding:6px 0;line-height:1.5}

/* Footer */
.footer{text-align:center;font-size:11px;color:#1e293b;padding:0 0 24px}

/* Day/Night indicator */
.daynight{
  display:inline-block;font-size:10px;padding:2px 6px;border-radius:6px;
  margin-left:6px;font-weight:600;vertical-align:middle;
}
</style>
</head>
<body>

<!-- в”Җв”Җ Setup в”Җв”Җ -->
<div id="setupScreen">
  <div class="setup-logo">рҹҢҸ</div>
  <div class="setup-title">л¶ҖмӮ° В· л°ңлҰ¬ лӮ м”Ё</div>
  <div class="setup-desc">
    AccuWeather API нӮӨлҘј мһ…л Ҙн•ҳл©ҙ<br>
    мӢӨмӢңк°„ лӮ м”Ё м •ліҙлҘј л¶Ҳлҹ¬мҳөлӢҲлӢӨ.
  </div>

  <div class="input-wrap">
    <input type="password" id="keyInput" placeholder="API Key мһ…л Ҙ" autocomplete="off" spellcheck="false">
    <button class="toggle-vis" onclick="toggleVis()">рҹ‘Ғ</button>
  </div>

  <button class="btn-start" onclick="startApp()">мӢңмһ‘н•ҳкё° вҶ’</button>

  <div class="setup-footer">
    л¬ҙлЈҢ API нӮӨ л°ңкёү вҶ’
    <a href="https://developer.accuweather.com/" target="_blank">developer.accuweather.com</a><br>
    <span style="color:#1e3a5f;font-size:11px">Free Limited Trial В· 50 calls/day</span>
  </div>
</div>

<!-- в”Җв”Җ Main в”Җв”Җ -->
<div id="mainApp">
  <div class="header">
    <div>
      <div class="h-title">рҹҢҸ л¶ҖмӮ° В· л°ңлҰ¬</div>
      <div class="h-sub">л¶ҖмӮ° UTC+9 &nbsp;В·&nbsp; л°ңлҰ¬ UTC+8 &nbsp;В·&nbsp; мӢңм°Ё 1мӢңк°„</div>
    </div>
    <div class="h-btns">
      <button class="h-btn" onclick="refresh()">вҶ» к°ұмӢ </button>
      <button class="h-btn" onclick="resetKey()">рҹ”‘</button>
    </div>
  </div>
  <div class="cards" id="cards"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
/* в”Җв”Җ лҸ„мӢң м„Өм • в”Җв”Җ */
const CITIES=[
  {
    id:'busan',name:'л¶ҖмӮ°',country:'лҢҖн•ңлҜјкөӯ',
    tz:'Asia/Seoul',flag:'рҹҮ°рҹҮ·',
    query:'Busan',ccode:'KR',
    tagline:'н•ҙмҡҙлҢҖ В· кҙ‘м•ҲлҰ¬ В· н•ңкөӯ м ң2лҸ„мӢң',
    accent:'#60a5fa',sec:'#93c5fd',
    bg:'linear-gradient(160deg,#071b3e 0%,#0a2e60 50%,#071b3e 100%)',
    bdr:'rgba(59,130,246,0.3)',sdw:'rgba(37,99,235,0.3)',
  },
  {
    id:'bali',name:'л°ңлҰ¬',country:'мқёлҸ„л„ӨмӢңм•„',
    tz:'Asia/Makassar',flag:'рҹҮ®рҹҮ©',
    query:'Denpasar',ccode:'ID',
    tagline:'мӢ л“Өмқҳ м„¬ В· лҚҙнҢҢмӮ¬лҘҙ В· WITA',
    accent:'#fb923c',sec:'#fdba74',
    bg:'linear-gradient(160deg,#2a0d02 0%,#7c2d12 50%,#2a0d02 100%)',
    bdr:'rgba(234,88,12,0.3)',sdw:'rgba(194,65,12,0.3)',
  }
];

/* в”Җв”Җ AccuWeather м•„мқҙмҪҳ вҶ’ мқҙлӘЁм§Җ в”Җв”Җ */
const ICONS={
  1:'вҳҖпёҸ',2:'вҳҖпёҸ',3:'вӣ…',4:'вӣ…',5:'вӣ…',
  6:'вҳҒпёҸ',7:'вҳҒпёҸ',8:'вҳҒпёҸ',11:'рҹҢ«пёҸ',
  12:'рҹҢҰпёҸ',13:'рҹҢҰпёҸ',14:'рҹҢҰпёҸ',
  15:'вӣҲпёҸ',16:'вӣҲпёҸ',17:'вӣҲпёҸ',
  18:'рҹҢ§пёҸ',19:'рҹҢЁпёҸ',20:'вқ„пёҸ',21:'вқ„пёҸ',22:'вқ„пёҸ',
  23:'рҹҢЁпёҸ',24:'рҹҢЁпёҸ',25:'рҹҢЁпёҸ',26:'рҹҢЁпёҸ',29:'рҹҢЁпёҸ',
  30:'рҹҢЎпёҸ',31:'рҹҢЎпёҸ',32:'рҹ’Ё',
  33:'рҹҢҷ',34:'рҹҢҷ',35:'рҹҢӨпёҸ',36:'рҹҢӨпёҸ',37:'рҹҢӨпёҸ',
  38:'вҳҒпёҸ',39:'рҹҢҰпёҸ',40:'рҹҢҰпёҸ',41:'вӣҲпёҸ',42:'вӣҲпёҸ',
  43:'вқ„пёҸ',44:'вқ„пёҸ'
};

const UV_KO ={'Low':'лӮ®мқҢ','Moderate':'ліҙнҶө','High':'лҶ’мқҢ','Very High':'л§Өмҡ° лҶ’мқҢ','Extreme':'мң„н—ҳ'};
const WDIR={'N':'л¶Ғ','NNE':'л¶Ғл¶ҒлҸҷ','NE':'л¶ҒлҸҷ','ENE':'лҸҷл¶ҒлҸҷ','E':'лҸҷ','ESE':'лҸҷлӮЁлҸҷ',
  'SE':'лӮЁлҸҷ','SSE':'лӮЁлӮЁлҸҷ','S':'лӮЁ','SSW':'лӮЁлӮЁм„ң','SW':'лӮЁм„ң','WSW':'м„ңлӮЁм„ң',
  'W':'м„ң','WNW':'м„ңл¶Ғм„ң','NW':'л¶Ғм„ң','NNW':'л¶Ғл¶Ғм„ң'};

/* в”Җв”Җ State в”Җв”Җ */
let KEY='';
let locs={};      // {id: locationKey}
let cache={};     // {id: {data, ts}}
let clockId=null;

/* в”Җв”Җ Setup в”Җв”Җ */
function toggleVis(){
  const inp=document.getElementById('keyInput');
  inp.type=inp.type==='password'?'text':'password';
}

function startApp(){
  const k=document.getElementById('keyInput').value.trim();
  if(!k){alert('API нӮӨлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.');return;}
  KEY=k;
  localStorage.setItem('accu_key',k);
  locs=JSON.parse(localStorage.getItem('accu_locs')||'{}');
  document.getElementById('setupScreen').style.display='none';
  const app=document.getElementById('mainApp');
  app.classList.add('on');
  initClock();
  loadWeather();
}

function resetKey(){
  if(!confirm('API нӮӨлҘј мҙҲкё°нҷ”н• к№Ңмҡ”?'))return;
  localStorage.removeItem('accu_key');
  localStorage.removeItem('accu_locs');
  KEY='';locs={};cache={};
  if(clockId)clearInterval(clockId);
  document.getElementById('mainApp').classList.remove('on');
  document.getElementById('setupScreen').style.display='flex';
}

/* в”Җв”Җ Clock в”Җв”Җ */
function initClock(){
  if(clockId)clearInterval(clockId);
  tickClock();
  clockId=setInterval(tickClock,1000);
}

function tickClock(){
  const now=new Date();
  CITIES.forEach(c=>{
    const hm=document.getElementById('hm_'+c.id);
    const sc=document.getElementById('sc_'+c.id);
    const dt=document.getElementById('dt_'+c.id);
    if(!hm)return;
    const p={};
    new Intl.DateTimeFormat('en-US',{
      timeZone:c.tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false
    }).formatToParts(now).forEach(({type,value})=>p[type]=value);
    hm.textContent=`${p.hour}:${p.minute}`;
    sc.textContent=`:${p.second}`;
    if(dt)dt.textContent=now.toLocaleDateString('ko-KR',{
      timeZone:c.tz,year:'numeric',month:'long',day:'numeric',weekday:'short'
    });
  });
}

/* в”Җв”Җ API (лӢӨмӨ‘ н”„лЎқмӢң нҸҙл°ұ) в”Җв”Җ */
async function acuFetch(url){
  const TIMEOUT=9000;
  const tid=ms=>new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms));

  // 1мҲңмң„: corsproxy.io вҖ” raw мқ‘лӢө м§Ғм ‘ л°ҳнҷҳ
  try{
    const res=await Promise.race([
      fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`),
      tid(TIMEOUT)
    ]);
    if(res.ok){
      const data=await res.json();
      if(data&&!data.Code) return data; // Code н•„л“ң = AccuWeather мҳӨлҘҳ
      if(data?.Code==='Unauthorized'||data?.Code==='InvalidApiKey')
        throw new Error('API нӮӨ мҳӨлҘҳ вҖ” нӮӨлҘј нҷ•мқён•ҙмЈјм„ёмҡ”');
    }
  }catch(e){if(e.message.includes('API'))throw e;console.warn('proxy1:',e.message);}

  // 2мҲңмң„: allorigins.win вҖ” JSON лһҳнҚј нҳ•мӢқ
  try{
    const res=await Promise.race([
      fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`),
      tid(TIMEOUT)
    ]);
    if(res.ok){
      const wrap=await res.json();
      const code=wrap?.status?.http_code;
      if(code===401||code===403) throw new Error('API нӮӨ мҳӨлҘҳ вҖ” нӮӨлҘј нҷ•мқён•ҙмЈјм„ёмҡ”');
      if(code&&code!==200) throw new Error('AccuWeather мҳӨлҘҳ '+code);
      return JSON.parse(wrap.contents);
    }
  }catch(e){if(e.message.includes('API')||e.message.includes('AccuWeather'))throw e;console.warn('proxy2:',e.message);}

  // 3мҲңмң„: thingproxy вҖ” мөңмў… нҸҙл°ұ
  try{
    const res=await Promise.race([
      fetch(`https://thingproxy.freeboard.io/fetch/${url}`),
      tid(TIMEOUT)
    ]);
    if(res.ok) return await res.json();
  }catch(e){console.warn('proxy3:',e.message);}

  throw new Error('лӮ м”Ё м—°кІ° мӢӨнҢЁ вҖ” к°ұмӢ  лІ„нҠјмқ„ лҲҢлҹ¬ мһ¬мӢңлҸ„');
}

async function getLocKey(city){
  if(locs[city.id])return locs[city.id];
  const url=`https://dataservice.accuweather.com/locations/v1/cities/search`
    +`?apikey=${KEY}&q=${encodeURIComponent(city.query)}&language=ko-kr`;
  const data=await acuFetch(url);
  if(!data||!data.length)throw new Error(city.name+' мң„м№ҳ мЎ°нҡҢ мӢӨнҢЁ');
  const found=data.find(d=>d.Country&&d.Country.ID===city.ccode)||data[0];
  locs[city.id]=found.Key;
  localStorage.setItem('accu_locs',JSON.stringify(locs));
  return found.Key;
}

async function getCurrent(locKey){
  const url=`https://dataservice.accuweather.com/currentconditions/v1/${locKey}`
    +`?apikey=${KEY}&language=ko-kr&details=true`;
  const data=await acuFetch(url);
  if(!data||!data.length)throw new Error('лӮ м”Ё лҚ°мқҙн„° м—ҶмқҢ');
  return data[0];
}

/* в”Җв”Җ Load в”Җв”Җ */
function refresh(){cache={};loadWeather();}

async function loadWeather(){
  const now=Date.now();
  const TTL=30*60*1000;
  const allOK=CITIES.every(c=>cache[c.id]&&(now-cache[c.id].ts)<TTL);
  if(allOK){renderCards({});return;}

  renderCards(null); // loading

  const errs={};
  await Promise.all(CITIES.map(async c=>{
    try{
      if(cache[c.id]&&(now-cache[c.id].ts)<TTL)return;
      const key=await getLocKey(c);
      const wx=await getCurrent(key);
      cache[c.id]={data:wx,ts:Date.now()};
    }catch(e){errs[c.id]=e.message;}
  }));

  renderCards(errs);
  const ts=Math.max(...CITIES.map(c=>cache[c.id]?.ts||0));
  if(ts>0)document.getElementById('footer').textContent=
    `AccuWeather В· кё°мӨҖ ${new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`;
}

/* в”Җв”Җ Render в”Җв”Җ */
function renderCards(errs){
  const el=document.getElementById('cards');
  el.innerHTML='';
  CITIES.forEach(c=>el.appendChild(makeCard(c,errs)));
  tickClock();
}

function makeCard(city,errs){
  const loading=errs===null;
  const err=errs?errs[city.id]:null;
  const wx=cache[city.id]?.data;

  // в”Җв”Җ weather section в”Җв”Җ
  const icon=wx?(ICONS[wx.WeatherIcon]||'рҹҢЎпёҸ'):'';
  const wxText=wx?wx.WeatherText:'';
  const isDayBadge=wx!=null
    ? `<span class="daynight" style="background:${wx.IsDayTime?'rgba(251,191,36,.2)':'rgba(99,102,241,.2)'}; color:${wx.IsDayTime?'#fbbf24':'#818cf8'}">${wx.IsDayTime?'лӮ®':'л°Ө'}</span>`
    : '';

  // в”Җв”Җ stats в”Җв”Җ
  let statsHtml='';
  if(loading){
    statsHtml=`<div class="stats4">${[0,1,2,3].map(()=>`
      <div><div class="skel" style="height:9px;margin-bottom:6px"></div>
      <div class="skel" style="height:15px"></div></div>`).join('')}</div>`;
  } else if(err){
    statsHtml=`<div class="err-msg">вҡ пёҸ ${err}</div>`;
  } else if(wx){
    const t=Math.round(wx.Temperature.Metric.Value);
    const f=Math.round(wx.RealFeelTemperature.Metric.Value);
    const hum=wx.RelativeHumidity;
    const ws=Math.round(wx.Wind.Speed.Metric.Value);
    const wd=WDIR[wx.Wind.Direction.English]||wx.Wind.Direction.English;
    const wg=wx.WindGust?Math.round(wx.WindGust.Speed.Metric.Value):null;
    const uv=wx.UVIndex;
    const uvTxt=UV_KO[wx.UVIndexText]||wx.UVIndexText||'-';
    const uvC=uv==null?'#94a3b8':uv<=2?'#4ade80':uv<=5?'#facc15':uv<=7?'#f97316':uv<=10?'#ef4444':'#a855f7';
    const vis=wx.Visibility?Math.round(wx.Visibility.Metric.Value):'-';
    const dew=wx.DewPoint?Math.round(wx.DewPoint.Metric.Value)+'В°C':'-';
    const precip=wx.PrecipitationSummary?.PastHour?.Metric?.Value;
    const precipStr=precip!=null?(precip+'гҺң'):'-';

    statsHtml=`
    <div class="stats4">
      <div>
        <div class="s-lbl">кё°мҳЁ</div>
        <div class="s-val">${t}В°C</div>
        <div class="s-sub">мІҙк°җ ${f}В°</div>
      </div>
      <div>
        <div class="s-lbl">мҠөлҸ„</div>
        <div class="s-val">${hum}%</div>
      </div>
      <div>
        <div class="s-lbl">л°”лһҢ</div>
        <div class="s-val">${ws}гҺһ/h</div>
        <div class="s-sub">${wd}${wg?` В· лҸҢн’Қ ${wg}`:''}</div>
      </div>
      <div>
        <div class="s-lbl">мһҗмҷём„ </div>
        <div class="s-val" style="color:${uvC}">${uv!=null?uv:'-'}</div>
        <div class="s-sub">${uvTxt}</div>
      </div>
    </div>
    <div class="stats3">
      <div>
        <div class="s-lbl">к°ҖмӢңкұ°лҰ¬</div>
        <div class="s-val sm">${vis}гҺһ</div>
      </div>
      <div>
        <div class="s-lbl">мқҙмҠ¬м җ</div>
        <div class="s-val sm">${dew}</div>
      </div>
      <div>
        <div class="s-lbl">1мӢңк°„ к°•мҲҳ</div>
        <div class="s-val sm">${precipStr}</div>
      </div>
    </div>`;
  }

  const card=document.createElement('div');
  card.className='card';
  card.style.cssText=`background:${city.bg};border:1px solid ${city.bdr};box-shadow:0 16px 48px ${city.sdw}`;
  card.innerHTML=`
  <div class="card-body">
    <div class="card-top">
      <div>
        <div class="city-country" style="color:${city.accent}">${city.flag} ${city.country}</div>
        <div class="city-name">${city.name}${isDayBadge}</div>
        <div class="city-tag">${city.tagline}</div>
      </div>
      <div>
        <div class="wx-icon">${icon}</div>
        <div class="wx-text">${wxText}</div>
      </div>
    </div>
    <div class="card-date" id="dt_${city.id}"></div>
    <div class="clock">
      <span class="c-hm" id="hm_${city.id}">--:--</span>
      <span class="c-sec" style="color:${city.sec}" id="sc_${city.id}">:--</span>
    </div>
  </div>
  <div class="stats-wrap">${statsHtml}</div>`;
  return card;
}
