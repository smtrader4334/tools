// ===== мҲңмң„ кі„мӮ° =====
function calcStandings(teams, results) {
  const stats = {};
  teams.forEach(t => {
    stats[t.id] = { p:0, w:0, d:0, l:0, gf:0, ga:0 };
  });
  results.forEach(r => {
    const h = stats[r.home], a = stats[r.away];
    if (!h||!a) return;
    h.p++; a.p++;
    h.gf += r.hg; h.ga += r.ag;
    a.gf += r.ag; a.ga += r.hg;
    if (r.hg > r.ag) { h.w++; a.l++; }
    else if (r.hg < r.ag) { a.w++; h.l++; }
    else { h.d++; a.d++; }
  });
  return teams.map(t => ({
    ...t, ...stats[t.id],
    pts: stats[t.id].w*3 + stats[t.id].d,
    gd: stats[t.id].gf - stats[t.id].ga
  })).sort((a,b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    if (b.gd  !== a.gd)  return b.gd  - a.gd;
    return b.gf - a.gf;
  });
}

function getTeam(id, teams) {
  return teams.find(t=>t.id===id) || { name:id, flag:"рҹҸі" };
}

// ===== л ҢлҚ”л§Ғ =====
function render() {
  renderTabs();
  renderContent();
  checkLive();
}

function renderTabs() {
  const tabEl = document.getElementById("tabs");
  const keys = Object.keys(data);
  tabEl.innerHTML = keys.map(g => {
    const hasLive = data[g].results.some(r=>r.live);
    const label = hasLive ? `рҹ”ҙ ${g}мЎ°` : `${g}мЎ°`;
    return `<button class="tab${g===activeGroup?' active':''}" onclick="setGroup('${g}')">${label}</button>`;
  }).join("");
}

function renderContent() {
  const g = data[activeGroup];
  const standings = calcStandings(g.teams, g.results);
  let html = "";

  // мҲңмң„н‘ң
  html += `
  <div class="card">
    <div class="card-header">
      <span class="card-title">рҹ“Ҡ мЎ° ${activeGroup} мҲңмң„н‘ң</span>
      <span class="card-meta">${g.results.length}кІҪкё° мҷ„лЈҢ</span>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:28px">#</th>
          <th class="left">нҢҖ</th>
          <th>кІҪ</th><th>мҠ№</th><th>л¬ҙ</th><th>нҢЁ</th><th>л“қмӢӨ</th>
          <th style="color:#ffd700">мҠ№м җ</th>
        </tr>
      </thead>
      <tbody>
  `;
  standings.forEach((t, i) => {
    const rankColors = [
      { bg:"rgba(0,200,100,0.15)", border:"#00c864" },
      { bg:"rgba(0,180,80,0.10)",  border:"#00a050" },
      { bg:"rgba(255,180,0,0.10)", border:"#e6a800" },
      { bg:"rgba(255,60,60,0.06)", border:"#333"   },
    ];
    const rc = rankColors[Math.min(i, 3)];
    const rankColor = i<2 ? "#00c864" : i===2 ? "#e6a800" : "#6b7fa3";
    const gdClass = t.gd>0?"gd-pos":t.gd<0?"gd-neg":"gd-zer";
    const gdStr = t.gd>0?"+"+t.gd:t.gd;
    const hostBadge = t.host ? `<span class="host-badge">H</span>` : "";
    html += `
      <tr style="background:${rc.bg};border-left:3px solid ${rc.border}">
        <td class="rank" style="color:${rankColor}">${i+1}</td>
        <td class="team-cell">
          <div class="team-inner">
            <span class="team-flag">${t.flag}</span>
            <span class="team-name${i<2?' bold':''}">${t.name}${hostBadge}</span>
          </div>
        </td>
        <td style="color:#6b7fa3">${t.p}</td>
        <td>${t.w}</td>
        <td style="color:#6b7fa3">${t.d}</td>
        <td style="color:#6b7fa3">${t.l}</td>
        <td class="${gdClass}">${gdStr}</td>
        <td class="pts">${t.pts}</td>
      </tr>
    `;
  });
  html += `
      </tbody>
    </table>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00c864"></div>32к°• м§„м¶ң</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e6a800"></div>3мң„к¶Ң кІҪмҹҒ</div>
      <div class="legend-item"><div class="legend-dot" style="background:#444"></div>нғҲлқҪк¶Ң</div>
    </div>
  </div>`;

  // кІ°кіј
  if (g.results.length > 0) {
    html += `
    <div class="card">
      <div class="card-header"><span class="card-title">вң… кІҪкё° кІ°кіј</span></div>
    `;
    [...g.results].reverse().forEach(r => {
      const ht = getTeam(r.home, g.teams);
      const at = getTeam(r.away, g.teams);
      const liveBadge = r.live
        ? `<div class="live-badge"><span>в—Ҹ</span> LIVE</div>`
        : "";
      html += `
      <div class="result-row">
        <div class="team-side">
          <span class="result-flag">${ht.flag}</span>
          <span class="result-name">${ht.name}</span>
        </div>
        <div class="score-block">
          ${liveBadge}
          <div class="score-box">${r.hg} - ${r.ag}</div>
          <div class="score-date">${r.date}</div>
        </div>
        <div class="team-side right">
          <span class="result-name">${at.name}</span>
          <span class="result-flag">${at.flag}</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // мҳҲм •
  if (g.upcoming.length > 0) {
    html += `
    <div class="card">
      <div class="card-header"><span class="card-title">рҹ“… мҳҲм • кІҪкё°</span></div>
    `;
    g.upcoming.forEach(u => {
      const ht = getTeam(u.home, g.teams);
      const at = getTeam(u.away, g.teams);
      const badge = u.today
        ? `<span class="today-badge">рҹ”ҙ ${u.date}</span>`
        : `<span class="date-badge">${u.date}</span>`;
      html += `
      <div class="upcoming-row">
        <div class="team-side">
          <span class="result-flag">${ht.flag}</span>
          <span class="result-name" style="font-weight:500">${ht.name}</span>
        </div>
        <div class="score-block">${badge}</div>
        <div class="team-side right">
          <span class="result-name" style="font-weight:500">${at.name}</span>
          <span class="result-flag">${at.flag}</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById("groupContent").innerHTML = html;
}

function checkLive() {
  const hasLive = Object.values(data).some(g => g.results.some(r=>r.live));
  document.getElementById("liveDot").style.display = hasLive ? "flex" : "none";
}

function setGroup(g) {
  activeGroup = g;
  render();
  // нғӯ мҠӨнҒ¬лЎӨ
  const tabEl = document.getElementById("tabs");
  const activeTab = tabEl.querySelector(".active");
  if (activeTab) activeTab.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
}

// ===== AI м—…лҚ°мқҙнҠё =====
async function aiUpdate() {
  const btn = document.getElementById("updateBtn");
  const msg = document.getElementById("updateMsg");
  btn.disabled = true;
  btn.innerHTML = `<span class="spin">вҹі</span> мӣ№ кІҖмғү мӨ‘...`;
  msg.textContent = "Anthropic APIлЎң мөңмӢ  кІҪкё° кІ°кіјлҘј кІҖмғү мӨ‘мһ…лӢҲлӢӨ...";

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{
          role: "user",
          content: `Search for all 2026 FIFA World Cup group stage results as of today June 19 2026.
For every COMPLETED match with a FINAL score, output EXACTLY one line in this format:
RESULT:[GROUP]|[HOME_ID]|[HG]-[AG]|[AWAY_ID]

Team IDs:
A: MEX KOR CZE RSA | B: CAN SUI QAT BIH | C: BRA SCO MAR HAI
D: USA AUS PAR TUR | E: GER CIV ECU CUW | F: NED SWE JPN TUN
G: BEL EGY IRN NZL | H: ESP URU SAU CPV | I: FRA NOR SEN IRQ
J: ARG AUT ALG JOR | K: COL POR DRC UZB | L: ENG GHA CRO PAN

Only FINAL scores. Output RESULT: lines only, no other text.`
        }]
      })
    });

    const json = await res.json();
    const text = json.content
      .filter(b => b.type === "text")
      .map(b => b.text)
      .join("\n");

    let updated = 0;
    text.split("\n").forEach(line => {
      const m = line.match(/RESULT:([A-L])\|(\w+)\|(\d+)-(\d+)\|(\w+)/);
      if (!m) return;
      const [,grp,home,hgStr,agStr,away] = m;
      const hg = parseInt(hgStr), ag = parseInt(agStr);
      if (!data[grp]) return;

      const exists = data[grp].results.find(r=>r.home===home&&r.away===away);
      if (exists) {
        exists.hg = hg; exists.ag = ag; exists.live = false;
        updated++;
      } else {
        data[grp].results.push({ home, away, hg, ag, date:"м—…лҚ°мқҙнҠё" });
        data[grp].upcoming = data[grp].upcoming.filter(
          u => !(u.home===home && u.away===away)
        );
        updated++;
      }
    });

    const now = new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("headerSub").textContent = `л§Ҳм§Җл§ү м—…лҚ°мқҙнҠё: ${now}`;
    msg.style.color = "#00c864";
    msg.textContent = updated > 0
      ? `вң… ${updated}к°ң кІҪкё° кІ°кіј л°ҳмҳҒ мҷ„лЈҢ`
      : "в„№пёҸ мғҲлЎңмҡҙ кІ°кіј м—ҶмқҢ (мқҙлҜё мөңмӢ  мғҒнғң)";

    render();
  } catch(e) {
    msg.style.color = "#ff6060";
    msg.textContent = "вқҢ м—…лҚ°мқҙнҠё мӢӨнҢЁ: " + e.message;
  }

  btn.disabled = false;
  btn.innerHTML = `рҹӨ– AIлЎң мөңмӢ  кІ°кіј м—…лҚ°мқҙнҠё`;
}

// ===== мҙҲкё°нҷ” =====
render();
</script>
</body>
</html>
