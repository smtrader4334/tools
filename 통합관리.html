// ── 집계 ──
const yy2=()=>String(year).slice(2);
const inYear=c=>(c.cn||'').startsWith(yy2());        // 선택 연도 계약(수임)
const cnYr=c=>{const s=(c.cn||'').slice(0,2);return /^\d\d$/.test(s)?2000+ +s:null;}; // 계약번호 연도
const leYear=c=>{const y=cnYr(c);return y==null||y<=year;};   // 올해 이하(미래 계약 제외)
const closedYr=c=>stOf(c)==='종결'&&(c.cls||'').startsWith(String(year)); // 선택 연도 종결
const isOpenC=c=>stOf(c)!=='종결';                   // 미결(진행·검토)
const inView=c=>{const y=cnYr(c);if(y!=null&&y>year)return false;return inYear(c)||isOpenC(c)||closedYr(c);}; // 올해 보기 집합
const isTrans=c=>{const y=cnYr(c);return y!=null&&y<year&&(isOpenC(c)||closedYr(c));}; // 이관=전년 계약인데 올해 미결 또는 올해 종결
function yearsAvail(){
  const cur=new Date().getFullYear();
  const ys=new Set([year,cur,cur+1]);
  D.cases.forEach(c=>{const cyy=(c.cn||'').slice(0,2);if(/^\d\d$/.test(cyy))ys.add(2000+ +cyy);if(isD(c.cls))ys.add(+String(c.cls).slice(0,4));});
  return [...ys].filter(Boolean).sort((a,b)=>b-a);
}
function hasYear(y){return D.cases.some(c=>(c.cn||'').startsWith(String(y).slice(2))||(isD(c.cls)&&String(c.cls).startsWith(String(y))));}
function initYear(){const cur=new Date().getFullYear();year=hasYear(cur)?cur:(yearsAvail().filter(hasYear)[0]||cur);D.year=year;}
function setYear(y){year=+y;D.year=+y;filt='전체';render();}
const gkey=c=>c.gid||c.id;                          // 같은 사건(가지급 분할) 묶음 키
const uniq=cs=>new Set(cs.map(gkey)).size;
function recvReps(){ // 올해 수임: 사건(gkey)별 1건 대표, net·cost는 전 portion(중간지급분 포함) 합산
  const g={};
  D.cases.filter(inYear).forEach(c=>{const k=gkey(c);
    if(!g[k])g[k]={rep:c,net:0,cost:0};
    g[k].net+=net(c);g[k].cost+=(+c.cost||0);});
  return Object.values(g).map(o=>({...o.rep,_net:o.net,_cost:o.cost}));
}
function stats(){
  const reps=recvReps();
  return{
    total:reps.length,
    closed:uniq(D.cases.filter(closedYr)),
    trans:uniq(D.cases.filter(isTrans)),
    review:uniq(D.cases.filter(c=>stOf(c)==='검토중'&&leYear(c))),
    prog:uniq(D.cases.filter(c=>stOf(c)==='진행중'&&leYear(c))),
    sun:reps.filter(isSun).length,indep:reps.filter(c=>!isSun(c)).length,
    avgIndep:(()=>{const ind=reps.filter(c=>!isSun(c));return ind.length?Math.round(ind.reduce((s,c)=>s+c._net,0)/ind.length):0;})(),
    cost:reps.reduce((s,c)=>s+c._cost,0)};
}

// ── 날짜/정렬 헬퍼 ──
const isD=s=>/^\d{4}-\d{2}-\d{2}$/.test(s||'');
const md_=s=>isD(s)?(s).slice(5).replace('-','/'):(s&&s!=='-'?s:'');
const dsince=s=>{if(!isD(s))return null;return Math.floor((new Date().setHours(0,0,0,0)-new Date(s).getTime())/86400000);};
const pct=r=>{if(!r)return'';return (+(r*100).toFixed(2))+'%';};
const fpv=v=>{const t=(v||'').trim();if(!t||t.toUpperCase()==='X')return '<b style="color:#cbd5e1">X</b>';return `<b style="color:#16a34a">${(isD(t)?md_(t):t).replace(/&/g,'&amp;').replace(/</g,'&lt;')}</b>`;};
const between=(a,b)=>{if(!isD(a)||!isD(b))return null;return Math.round((new Date(b)-new Date(a))/86400000);};
function sortBy(cs){
  if(filt==='검토중')cs.sort((a,b)=>(a.sub||'9999-99').localeCompare(b.sub||'9999-99')); // 제출일 오래된 순
  else if(filt==='종결')cs.sort((a,b)=>(a.cls||'').localeCompare(b.cls||'')); // 종결일 오래된 순
  else cs.sort((a,b)=>(a.cn||'').localeCompare(b.cn||'')); // 계약번호 오래된 순
  return cs;
}
// 필터별 사건 집합: 전체/진행중/선임/독립 = 올해 수임(26~), 종결 = 올해 종결(종결일)
function listFor(){
  let cs;
  if(filt==='종결')cs=D.cases.filter(closedYr);
  else if(filt==='진행중')cs=D.cases.filter(c=>stOf(c)==='진행중'&&leYear(c));
  else if(filt==='검토중')cs=D.cases.filter(c=>stOf(c)==='검토중'&&leYear(c));
  else if(filt==='선임')cs=D.cases.filter(c=>inView(c)&&isSun(c));
  else if(filt==='독립')cs=D.cases.filter(c=>inView(c)&&!isSun(c));
  else cs=D.cases.filter(inView); // 전체 = 이관(전년 미결+당해종결) + 올해 계약
  if(q)cs=cs.filter(c=>(c.client+c.cn+c.ins+c.region).toLowerCase().includes(q.toLowerCase()));
  return sortBy(cs);
}

function gdStoreToken(token,exp){try{localStorage.setItem('gdc_token',token);localStorage.setItem('gdc_expiry',(Date.now()+((exp||3600)*1000)).toString());localStorage.setItem('gdc_authed','1');}catch(e){}}
function gdCachedToken(){try{const t=localStorage.getItem('gdc_token'),e=parseInt(localStorage.getItem('gdc_expiry')||'0');if(t&&Date.now()<e-120000)return t;}catch(e){}return null;}
function gdReady(){
  try{
    gdc=google.accounts.oauth2.initTokenClient({client_id:GD_CID,scope:GD_SCOPE,callback:async r=>{
      if(r.error){gdpend=null;gdSt('☁ 드라이브: 📤 저장으로 로그인');return;}

      else if(gdpend==='load'){gdpend=null;await gdDoLoad();}
      else{await gdDoLoad();}
    }});
    const c=gdCachedToken();
    if(c){gdtok=c;gdSt('✅ 자동저장 활성화','#16a34a');setTimeout(()=>gdDoLoad(),400);}
    else if(localStorage.getItem('gdc_authed')){gdSt('드라이브 재연결 중...');setTimeout(()=>{try{gdc.requestAccessToken({prompt:''});}catch(e){gdSt('☁ 드라이브: 📤 저장으로 로그인');}},700);}

async function gdH(url,opt={}){return fetch(url,{...opt,headers:{Authorization:`Bearer ${gdtok}`,...(opt.headers||{})}});}
async function gdFindId(){const r=await gdH(`https://www.googleapis.com/drive/v3/files?q=name='${GD_FILE}' and trashed=false&fields=files(id)`);const d=await r.json();return d.files?.[0]?.id||null;}
async function gdDoSave(silent){
  if(!silent)gdSt('💾 저장 중...','#c9a84c');

    const body=JSON.stringify(D);const fid=await gdFindId();

// ── 계약 종결 → 잔고 자동기록 (계산서면 수수료+계산서 쌍, 현금이면 수수료만) ──
// ── 종결 취소/종결일 변경 시 → 기존 auto 항목 전 월에서 삭제 후 재추가 ──
function syncLink(){
  var J=D.jango||(D.jango={});
  (D.cases||[]).forEach(function(c){
    var P='auto:'+c.id+':';
    // 1단계: 모든 월에서 이 케이스의 auto 항목 전부 삭제 (종결일 변경·종결 취소 대응)
    Object.keys(J).forEach(function(mk){
      var txs=J[mk].transactions;
      if(!txs)return;
      for(var i=txs.length-1;i>=0;i--){ if(String(txs[i].id).indexOf(P)===0)txs.splice(i,1); }
    });
    // 2단계: 종결이 아닌 경우 → 삭제만 하고 종료
    var cls=c.cls||''; if(!/^\d{4}-\d{2}-\d{2}$/.test(cls))return;
    // 3단계: 종결인 경우 → 해당 월에 재추가
    var mk=cls.slice(0,7);
    if(!J[mk])J[mk]={carryover:0,transactions:[],bizCosts:[],lifeCosts:[]};
    var txs=J[mk].transactions||(J[mk].transactions=[]);
    var manual=txs.some(function(t){return t.contractNo===c.cn && t.type==='수수료' && String(t.id).indexOf('auto:')!==0;});
    if(manual)return;
    if(!(+c.fee))return;
    var parts=(c.client||'').split('/');
    var nm=parts[0]||'-';                                    // 상호명 (label용)
    var payer=c.mgr==='선임권'?(c.ins||'보험사'):(parts[1]||parts[0]||'-'); // 수수료 입금자: 선임권→보험사, 일반→계약자명
    var noteParts=(c.note||'').split(',').map(function(s){return s.trim();});
    var refName=noteParts.find(function(t){return t&&['외주','영업','잔여','중간지급','미지급'].indexOf(t)<0&&t.indexOf('외주:')!==0;})||'소개';
    var outPart=noteParts.find(function(t){return t.indexOf('외주:')===0;});
    var outName=outPart?outPart.slice(3):'김다정';           // note의 '외주:이름'에서 추출, 없으면 김다정
    txs.push({id:P+'fee',label:nm+'(수수료)',contractNo:c.cn,person:payer,type:'수수료',amount:+c.fee,date:cls});
    if(+c.vat>0) txs.push({id:P+'tax',label:nm+'(계산서)',contractNo:c.cn,person:'유승민',type:'계산서',amount:-(+c.fee),date:cls});
    if(+c.ref>0) txs.push({id:P+'ref',label:nm+'(소개비)',contractNo:c.cn,person:refName,type:isSun(c)?'선임소개비':'소개비',amount:-(+c.ref),date:cls});
    if(+c.out>0) txs.push({id:P+'out',label:nm+'(외주비)',contractNo:c.cn,person:outName,type:'외주비',amount:-(+c.out),date:cls});
  });
}

function J_renderAnnual(){
  document.getElementById('summary').style.display='none';

  document.getElementById('cobbar').style.display='none';
  document.getElementById('footer').style.display='none';

  let cumAcc=0;
  const rows=J_MN.map((_,i)=>{
    const k=`${jYear}-${String(i+1).padStart(2,'0')}`;
    const hasD=!!D.jango[k];
    const c=hasD?J_calcM(D.jango[k]):{net:0,bal:0,biz:0,life:0,pl:0};
    if(hasD) cumAcc+=c.pl;
    return{m:`${i+1}월`,hasD,carryover:D.jango[k]?.carryover||0,...c,cumPL:hasD?cumAcc:null};
  });
  const tNet=rows.reduce((s,r)=>s+r.net,0);
  const tBiz=rows.reduce((s,r)=>s+r.biz,0);
  const tLife=rows.reduce((s,r)=>s+r.life,0);
  const tPL=rows.reduce((s,r)=>s+r.pl,0);
  const lastCum=rows[rows.length-1]?.cumPL||0;

  // 마지막 데이터가 있는 월 인덱스
  const lastDataIdx=rows.reduce((acc,r,i)=>(r.net!==0||r.biz!==0?i:acc),-1);

  document.getElementById('content').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      ${[[`연간 순매출`,tNet,GOLD],[`연간 비용합계`,tBiz+tLife,'#f97316'],[`연간 손익`,tPL,tPL>=0?'#22c55e':'#dc2626'],[`누적손익`,lastDataIdx>=0?rows[lastDataIdx].cumPL:0,rows[lastDataIdx>=0?lastDataIdx:0]?.cumPL>=0?'#34d399':'#fb923c']].map(([l,v,cl])=>`

          <div style="color:${MUTED};font-size:10px">${F(v)}원</div>
        </div>`).join('')}
    </div>

      <div style="background:${NAV};padding:9px 10px;display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr 1fr 1fr;gap:3px">
        ${['월','잔고','순매출','비용','손익','누적손익'].map(h=>`<span style="color:rgba(255,255,255,.65);font-size:11px;font-weight:600">${h}</span>`).join('')}
      </div>
      ${rows.map((r,i)=>`
        <div style="display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr 1fr 1fr;gap:3px;padding:9px 10px;border-bottom:1px solid ${BORD};background:${i%2?'#fafbfc':'#fff'}">

          <span style="color:#0ea5e9;font-size:11px;font-weight:500">${r.hasD?W(r.bal):'-'}</span>

          <span style="color:#f97316;font-size:11px">${r.hasD?(r.biz+r.life?W(r.biz+r.life):'-'):'-'}</span>
          <span style="color:${r.hasD?J_SC(r.pl):MUTED};font-size:11px;font-weight:${r.hasD?700:400}">${r.hasD?(r.pl>=0?'+':'-')+W(Math.abs(r.pl)):'-'}</span>

        </div>`).join('')}
      <div style="display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr 1fr 1fr;gap:3px;padding:9px 10px;background:${NAV}">
        <span style="color:${GOLD};font-size:11px;font-weight:700">합계</span>

}
function J_setYear(y){
  if(y<2024||y>2035)return;
  jYear=y;
  jMonth=`${y}-${jMonth.split('-')[1]}`;
  save();J_render();
}
function J_seedMonth(type){
  const mi=parseInt(jMonth.split('-')[1]);
  const prevKey=mi===1?`${jYear-1}-12`:`${jYear}-${String(mi-1).padStart(2,'0')}`;
  const carryover=D.jango[prevKey]?J_calcM(D.jango[prevKey]).bal:0;
  let bizCosts=[],lifeCosts=[];
  const ts=Date.now();
  if(type==='default'||!D.jango[prevKey]){
    bizCosts=J_DEF_BIZ().map((b,i)=>({...b,id:`bx${i}_${ts}`}));
    lifeCosts=J_DEF_LIFE().map((l,i)=>({...l,id:`lx${i}_${ts}`}));
  } else {
    const prev=D.jango[prevKey];
    bizCosts=(prev.bizCosts||[]).map(b=>({...b,id:b.id+'c'+ts}));
    lifeCosts=(prev.lifeCosts||[]).map(l=>({...l,id:l.id+'c'+ts}));
  }
  D.jango[jMonth]={carryover,transactions:[],bizCosts,lifeCosts,_seeded:true};
  save();J_render();
}
function J_delItem(s,id){
  const m=J_getM();
  const k={tx:'transactions',biz:'bizCosts',life:'lifeCosts'}[s];
  m[k]=(m[k]||[]).filter(x=>x.id!==id);
  save();J_render();
}

      <div>
        <label style="color:${MUTED};font-size:12px;display:block;margin-bottom:4px">금액 (원, 양수 입력)</label>
        <div style="position:relative">
          <input name="amount" type="text" inputmode="numeric" class="inp" value="${Math.abs(iv.amount||0)?Math.abs(iv.amount).toLocaleString():''}" placeholder="0" style="padding-right:28px" required oninput="this.value=this.value.replace(/[^0-9]/g,'').replace(/\\B(?=(\\d{3})+(?!\\d))/g,',')">
          <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:${MUTED};font-size:12px">원</span>
        </div>
      </div>
      <button type="submit" style="background:${NAV};color:#fff;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:15px;margin-top:4px">${item?'수정 완료':'추가하기'}</button>
    </form>`;

  document.getElementById('mform').onsubmit=function(e){
    e.preventDefault();
    const fd=new FormData(this);
    const label=fd.get('label')||'';
    const rawAmt=parseFloat((fd.get('amount')||'0').toString().replace(/,/g,''));
    const person=fd.get('person')||'';
    const contractNo=fd.get('contractNo')||'';
    const type=fd.get('type')||'수수료';
    const txDate=fd.get('txDate')||'';
    if(!label||isNaN(rawAmt)||rawAmt===0)return;
    let amount=Math.abs(rawAmt);
    if(isTx&&type!=='수수료') amount=-amount;
    const newItem={
      id:(jEdit.item?.id)||`${s}${Date.now()}`,
      label,amount,
      ...(isTx?{date:txDate,contractNo,person,type}:{}),
      ...(isLife?{person}:{}),
    };
    const m=J_getM();
    const k={tx:'transactions',biz:'bizCosts',life:'lifeCosts'}[s];
    const list=m[k]||[];
    const idx=list.findIndex(x=>x.id===newItem.id);
    if(idx>=0)list[idx]=newItem;else list.push(newItem);
    m[k]=list;
    save();
    closeModal();
    J_render();
  };

  ov.style.display='flex';
}
function J_getTypeHint(t){
  const h={'수수료':'✅ 순매출에 포함','소개비':'📤 순매출에서 차감','외주비':'🔧 순매출에서 차감','선임소개비':'🔵 순매출 차감 (잔고 영향 없음)','생활비':'🏠 잔고만 차감','계산서':'📄 잔고만 차감','기타지출':'💸 잔고만 차감'};
  return h[t]||'';
}
function J_selType(t){
  document.getElementById('typeInput').value=t;
  document.getElementById('typeHint').textContent=J_getTypeHint(t);
  Object.keys(J_TT).forEach(k=>{
    const btn=document.getElementById('tt_'+k);
    if(!btn)return;
    const tt=J_TT[k],act=k===t;
    btn.style.background=act?tt.bg:'#f8fafc';
    btn.style.color=act?tt.tc:MUTED;
    btn.style.borderColor=act?tt.tc:BORD;
    btn.style.fontWeight=act?700:400;
  });
}

load();initYear();render();
</script>
</body>
</html>
