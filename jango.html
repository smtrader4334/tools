// ── 포맷 ──────────────────────────────────
const W=n=>{
  if((!n&&n!==0)||n===0)return'-';
  const a=Math.abs(+n);
  if(a>=100000000){const e=Math.floor(a/100000000),m=Math.floor((a%100000000)/10000);return m?`${e}억 ${m}만`:`${e}억`;}
  return a>=10000?Math.floor(a/10000)+'만':F(a)+'원';
};
const F=n=>(+n||0).toLocaleString('ko-KR');
const SC=n=>n>0?'#16a34a':n<0?'#dc2626':MUTED;

// ── 계산 ──────────────────────────────────
function calcM(m){
  if(!m)return{net:0,bal:0,biz:0,life:0,pl:0};
  const txs=m.transactions||[];
  const net=txs.filter(t=>TT[t.type]?.affects==='net').reduce((s,t)=>s+(+t.amount||0),0);
  const badj=txs.filter(t=>TT[t.type]?.affects==='bal').reduce((s,t)=>s+(+t.amount||0),0);
  const bal=(+m.carryover||0)+net+badj;
  const biz=(m.bizCosts||[]).reduce((s,c)=>s+(+c.amount||0),0);
  const life=(m.lifeCosts||[]).reduce((s,c)=>s+(+c.amount||0),0);
  return{net,bal,biz,life,pl:net-biz-life};
}

let gdAutoTimer=null;
async function save(){
  try{await window.storage.set('theham-jango-v6',JSON.stringify(D));}catch(e){}
  // localStorage 폴백 (Netlify 등 외부 환경)
  try{localStorage.setItem('theham-jango-v6',JSON.stringify(D));}catch(e){}

  if(gdtok){

      gdDoSave();
    },3000);
  }
}
async function load(){
  try{const r=await window.storage.get('theham-jango-v6');if(r?.value){D=JSON.parse(r.value);return;}}catch(e){}
  // localStorage 폴백
  try{const r=localStorage.getItem('theham-jango-v6');if(r)D=JSON.parse(r);}catch(e){}
}

  document.getElementById('summary').style.display='none';
  document.getElementById('secnav').style.display='none';

  let cumAcc=0;

    const k=`${year}-${String(i+1).padStart(2,'0')}`;

    const c=hasD?calcM(D[k]):{net:0,bal:0,biz:0,life:0,pl:0};
    if(hasD) cumAcc+=c.pl;
    return{m:`${i+1}월`,hasD,carryover:D[k]?.carryover||0,...c,cumPL:hasD?cumAcc:null};
  });
  const tNet=rows.reduce((s,r)=>s+r.net,0);
  const tBiz=rows.reduce((s,r)=>s+r.biz,0);
  const tLife=rows.reduce((s,r)=>s+r.life,0);
  const tPL=rows.reduce((s,r)=>s+r.pl,0);
  const lastCum=rows[rows.length-1]?.cumPL||0;

  // 마지막 데이터가 있는 월 인덱스
  const lastDataIdx=rows.reduce((acc,r,i)=>(r.net!==0||r.biz!==0?i:acc),-1);

  document.getElementById('content').innerHTML=`

        <div style="background:#fff;border-radius:12px;padding:12px 14px;box-shadow:0 1px 4px rgba(26,43,74,.08);border-left:4px solid ${cl}">
          <div style="color:${MUTED};font-size:11px">${l}</div>
          <div style="color:${cl};font-weight:800;font-size:18px;margin-top:2px">${v>=0?'+':'-'}${W(Math.abs(v))}</div>
          <div style="color:${MUTED};font-size:10px">${F(v)}원</div>
        </div>`).join('')}
    </div>
    <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(26,43,74,.07)">
      <div style="background:${NAV};padding:9px 10px;display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr 1fr 1fr;gap:3px">
        ${['월','잔고','순매출','비용','손익','누적손익'].map(h=>`<span style="color:rgba(255,255,255,.65);font-size:11px;font-weight:600">${h}</span>`).join('')}
      </div>
      ${rows.map((r,i)=>`
        <div style="display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr 1fr 1fr;gap:3px;padding:9px 10px;border-bottom:1px solid ${BORD};background:${i%2?'#fafbfc':'#fff'}">
          <span style="color:${TEXT};font-weight:600;font-size:13px">${r.m}</span>
          <span style="color:#0ea5e9;font-size:11px;font-weight:500">${r.hasD?W(r.bal):'-'}</span>
          <span style="color:${GOLD};font-size:11px;font-weight:500">${r.hasD&&r.net?W(r.net):'-'}</span>
          <span style="color:#f97316;font-size:11px">${r.hasD?(r.biz+r.life?W(r.biz+r.life):'-'):'-'}</span>
          <span style="color:${r.hasD?SC(r.pl):MUTED};font-size:11px;font-weight:${r.hasD?700:400}">${r.hasD?(r.pl>=0?'+':'-')+W(Math.abs(r.pl)):'-'}</span>
          <span style="color:${r.cumPL!==null?SC(r.cumPL):MUTED};font-size:11px;font-weight:${r.cumPL!==null?700:400}">${r.cumPL!==null?(r.cumPL>=0?'+':'-')+W(Math.abs(r.cumPL)):'-'}</span>
        </div>`).join('')}
      <div style="display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr 1fr 1fr;gap:3px;padding:9px 10px;background:${NAV}">
        <span style="color:${GOLD};font-size:11px;font-weight:700">합계</span>
        <span style="color:rgba(255,255,255,.3);font-size:11px">-</span>
        <span style="color:${GOLD};font-size:11px;font-weight:700">${W(tNet)}</span>
        <span style="color:#fca5a5;font-size:11px;font-weight:700">${W(tBiz+tLife)}</span>
        <span style="color:${SC(tPL)};font-size:11px;font-weight:700">${tPL>=0?'+':'-'}${W(Math.abs(tPL))}</span>

// 이 달 세팅
function seedMonth(type){
  const mi=parseInt(month.split('-')[1]);
  const prevKey=mi===1?`${year-1}-12`:`${year}-${String(mi-1).padStart(2,'0')}`;
  const carryover=D[prevKey]?calcM(D[prevKey]).bal:0;
  let bizCosts=[],lifeCosts=[];
  const ts=Date.now();
  if(type==='default'||!D[prevKey]){
    bizCosts=DEF_BIZ().map((b,i)=>({...b,id:`bx${i}_${ts}`}));
    lifeCosts=DEF_LIFE().map((l,i)=>({...l,id:`lx${i}_${ts}`}));
  } else {
    const prev=D[prevKey];
    bizCosts=(prev.bizCosts||[]).map(b=>({...b,id:b.id+'c'+ts}));
    lifeCosts=(prev.lifeCosts||[]).map(l=>({...l,id:l.id+'c'+ts}));
  }
  D[month]={carryover,transactions:[],bizCosts,lifeCosts,_seeded:true};
  save();render();
}

function delItem(s,id){
  const m=getM();
  const k={tx:'transactions',biz:'bizCosts',life:'lifeCosts'}[s];
  m[k]=(m[k]||[]).filter(x=>x.id!==id);
  save();render();
}

// ── 모달 ───────────────────────────────────
function openModal(s,item){
  editTarget={section:s,item:item||null};
  const ov=document.getElementById('overlay');
  const box=document.getElementById('mbox');
  const titles={tx:'수입/지출',biz:'업무고정비',life:'생활비'};
  const isTx=s==='tx';
  const isLife=s==='life';
  const iv=item||{};

  box.innerHTML=`
    <div style="background:${NAV};border-radius:16px 16px 0 0;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
      <span style="color:#fff;font-weight:700;font-size:16px">${item?'수정':'추가'} — ${titles[s]}</span>
      <button onclick="closeModal()" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;width:30px;height:30px;font-size:16px">✕</button>
    </div>
    <form id="mform" style="padding:18px;display:flex;flex-direction:column;gap:12px">
      <div>
        <label style="color:${MUTED};font-size:12px;display:block;margin-bottom:4px">항목명</label>
        <input name="label" class="inp" value="${iv.label||''}" placeholder="예) 성원아파트(화재)" required>
      </div>
      ${isTx?`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="color:${MUTED};font-size:12px;display:block;margin-bottom:4px">날짜</label>
          <input name="txDate" type="date" class="inp" value="${iv.date||''}">
        </div>
        <div>
          <label style="color:${MUTED};font-size:12px;display:block;margin-bottom:4px">계약번호(선택)</label>
          <input name="contractNo" class="inp" value="${iv.contractNo||''}" placeholder="260305F">
        </div>
      </div>
      <div>
        <label style="color:${MUTED};font-size:12px;display:block;margin-bottom:4px">담당자</label>
        <input name="person" class="inp" value="${iv.person||''}" placeholder="유승민">
      </div>
      <div>
        <label style="color:${MUTED};font-size:12px;display:block;margin-bottom:6px">유형</label>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${Object.keys(TT).map(t=>{
            const tt=TT[t],act=(iv.type||'수수료')===t;
            return`<button type="button" onclick="selType('${t}')" id="tt_${t}" style="background:${act?tt.bg:'#f8fafc'};color:${act?tt.tc:MUTED};border:1.5px solid ${act?tt.tc:BORD};border-radius:20px;padding:4px 10px;font-size:12px;font-weight:${act?700:400}">${t}</button>`;
          }).join('')}
        </div>
        <input type="hidden" name="type" id="typeInput" value="${iv.type||'수수료'}">
        <div id="typeHint" style="color:${MUTED};font-size:11px;margin-top:5px">${getTypeHint(iv.type||'수수료')}</div>
      </div>`:''}
      ${isLife?`
      <div>
        <label style="color:${MUTED};font-size:12px;display:block;margin-bottom:4px">담당자</label>
        <input name="person" class="inp" value="${iv.person||''}" placeholder="김다정">
      </div>`:(!isTx?'':'')}
      <div>
        <label style="color:${MUTED};font-size:12px;display:block;margin-bottom:4px">금액 (원, 양수 입력)</label>
        <div style="position:relative">
          <input name="amount" type="number" class="inp" value="${Math.abs(iv.amount||0)||''}" placeholder="0" style="padding-right:28px" required>
          <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:${MUTED};font-size:12px">원</span>

      <button type="submit" style="background:${NAV};color:#fff;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:15px;margin-top:4px">${item?'수정 완료':'추가하기'}</button>

    const person=fd.get('person')||'';
    const contractNo=fd.get('contractNo')||'';
    const type=fd.get('type')||'수수료';
    const txDate=fd.get('txDate')||'';

    const newItem={
      id:(editTarget.item?.id)||`${s}${Date.now()}`,

function getTypeHint(t){

  return h[t]||'';
}

function selType(t){
  document.getElementById('typeInput').value=t;

  Object.keys(TT).forEach(k=>{

    btn.style.color=act?tt.tc:MUTED;

}

function closeModal(){
  document.getElementById('overlay').style.display='none';

}

document.getElementById('overlay').addEventListener('click',function(e){

});


// ── Google Drive 연동 ──────────────────────────────────────
const GD_CID='505763803094-8ej5ued2e8b5qe8v8k6ocphqnmm42o35.apps.googleusercontent.com';
const GD_SCOPE='https://www.googleapis.com/auth/drive.file';
const GD_FILE='theham-jango-data.json';
let gdc=null,gdtok=null,gdpend=null;

function gdSt(t,col='#8593b0'){
  const el=document.getElementById('gdst');
  if(el){el.textContent=t;el.style.color=col;}
}

function gdStoreToken(token,expiresIn){
  try{
    localStorage.setItem('gd_token',token);
    localStorage.setItem('gd_expiry',(Date.now()+((expiresIn||3600)*1000)).toString());
    localStorage.setItem('gd_was_authed','1');
  }catch(e){}
}
function gdCachedToken(){
  try{
    const tok=localStorage.getItem('gd_token');
    const exp=parseInt(localStorage.getItem('gd_expiry')||'0');
    if(tok&&Date.now()<exp-120000)return tok; // 만료 2분 전까지 유효
  }catch(e){}
  return null;
}

function gdReady(){
  try{
    gdc=google.accounts.oauth2.initTokenClient({
      client_id:GD_CID,
      scope:GD_SCOPE,
      callback:async r=>{
        if(r.error){
          if(gdpend){gdpend=null;}
          gdSt('☁ 드라이브: 📤 저장으로 로그인');
          return;
        }
        gdtok=r.access_token;
        gdStoreToken(r.access_token,r.expires_in);
        if(gdpend==='save'){gdpend=null;await gdDoSave();}
        else if(gdpend==='load'){gdpend=null;await gdDoLoad();}
        else{
          gdSt('📥 최신 데이터 불러오는 중...','#c9a84c');
          await gdDoLoad();
        }
      }
    });

    // 캐싱된 토큰 있으면 바로 사용 (팝업 없이)
    const cached=gdCachedToken();
    if(cached){
      gdtok=cached;
      gdSt('✅ 자동저장 활성화','#16a34a');
      setTimeout(async()=>await gdDoLoad(),500);
    } else if(localStorage.getItem('gd_was_authed')){
      // 토큰 만료 → 재로그인 필요 (팝업)
      gdSt('드라이브 재연결 중...');
      setTimeout(()=>{
        try{gdc.requestAccessToken({prompt:''});}
        catch(e){gdSt('☁ 드라이브: 📤 저장으로 로그인');}
      },800);
    }else{
      gdSt('☁ 드라이브: 📤 저장으로 로그인');
    }
  }catch(e){
    gdSt('⚠️ 드라이브 사용 불가','#f97316');
  }
}

async function gdH(url,opt={}){
  return fetch(url,{...opt,headers:{Authorization:`Bearer ${gdtok}`,...(opt.headers||{})}});
}

async function gdFindId(){
  const r=await gdH(`https://www.googleapis.com/drive/v3/files?q=name='${GD_FILE}' and trashed=false&fields=files(id)`);
  const d=await r.json();
  return d.files?.[0]?.id||null;
}

async function gdDoSave(){
  gdSt('💾 저장 중...','#c9a84c');
  try{
    const body=JSON.stringify(D);
    const fid=await gdFindId();
    if(fid){
      await gdH(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media`,
        {method:'PATCH',headers:{'Content-Type':'application/json'},body});
    }else{
      const fm=new FormData();
      fm.append('metadata',new Blob([JSON.stringify({name:GD_FILE,mimeType:'application/json'})],{type:'application/json'}));
      fm.append('file',new Blob([body],{type:'application/json'}));
      await gdH('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',body:fm});
    }
    const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    gdSt(`✅ 저장 완료 ${t}`,'#16a34a');
  }catch(e){gdSt('❌ 저장 실패: '+e.message,'#dc2626');}
}

async function gdDoLoad(){
  gdSt('📥 불러오는 중...','#c9a84c');
  try{
    const fid=await gdFindId();
    if(!fid){gdSt('⚠️ 드라이브에 저장된 파일 없음 (먼저 저장하세요)','#f97316');return;}
    const r=await gdH(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`);
    const loaded=await r.json();
    D=loaded;
    await save();render();
    const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    gdSt(`✅ 불러오기 완료 ${t}`,'#16a34a');
  }catch(e){gdSt('❌ 불러오기 실패: '+e.message,'#dc2626');}
}

function gdAuth(next){
  if(!gdc){gdSt('⚠️ GIS 라이브러리 미로드 - 인터넷 연결 확인','#f97316');return;}
  if(!gdtok){gdpend=next;gdc.requestAccessToken({prompt:''});}
  else{if(next==='save')gdDoSave();else gdDoLoad();}
}

// ── 초기화 ─────────────────────────────────
async function init(){
  await load();
  // 자동 세팅된 빈 달 정리 (트랜잭션 없고 _seeded 플래그 없으면 삭제)
  Object.keys(D).forEach(k=>{
    if(D[k]&&!(D[k].transactions||[]).length&&!D[k]._seeded){
      delete D[k];
    }
  });
  save();
  render();
}
init();
