    review:uniq(D.cases.filter(c=>inYear(c)&&!c.interim&&stOf(c)==='검토중')),
    prog:uniq(D.cases.filter(c=>inYear(c)&&!c.interim&&stOf(c)==='진행중')),
    sun:reps.filter(isSun).length,indep:reps.filter(c=>!isSun(c)).length,
    avgIndep:(()=>{const ind=reps.filter(c=>!isSun(c));return ind.length?Math.round(ind.reduce((s,c)=>s+c._net,0)/ind.length):0;})(),
    cost:reps.reduce((s,c)=>s+c._cost,0)};
}

// ── 날짜/정렬 헬퍼 ──
const isD=s=>/^\d{4}-\d{2}-\d{2}$/.test(s||'');
const md_=s=>isD(s)?(s).slice(5).replace('-','/'):(s&&s!=='-'?s:'');
const dsince=s=>{if(!isD(s))return null;return Math.floor((new Date().setHours(0,0,0,0)-new Date(s).getTime())/86400000);};
const pct=r=>{if(!r)return'';return (+(r*100).toFixed(2))+'%';};
const fpv=v=>{const t=(v||'').trim();if(!t||t.toUpperCase()==='X')return '<b style="color:#cbd5e1">X</b>';return `<b style="color:#16a34a">${(isD(t)?md_(t):t).replace(/&/g,'&amp;').replace(/</g,'&lt;')}</b>`;};
const between=(a,b)=>{if(!isD(a)||!isD(b))return null;return Math.round((new Date(b)-new Date(a))/86400000);};
function sortBy(cs){
  if(filt==='검토중')cs.sort((a,b)=>(a.sub||'9999-99').localeCompare(b.sub||'9999-99')); // 제출일 오래된 순
  else if(filt==='종결')cs.sort((a,b)=>(a.cls||'').localeCompare(b.cls||'')); // 종결일 오래된 순
  else cs.sort((a,b)=>(a.cn||'').localeCompare(b.cn||'')); // 계약번호 오래된 순
  return cs;
}
// 필터별 사건 집합: 전체/진행중/선임/독립 = 올해 수임(26~), 종결 = 올해 종결(종결일)
function listFor(){
  let cs;
  if(filt==='종결')cs=D.cases.filter(closedYr);
  else if(filt==='진행중')cs=D.cases.filter(c=>inYear(c)&&stOf(c)==='진행중');
  else if(filt==='검토중')cs=D.cases.filter(c=>inYear(c)&&stOf(c)==='검토중');
  else if(filt==='선임')cs=D.cases.filter(c=>inYear(c)&&isSun(c));
  else if(filt==='독립')cs=D.cases.filter(c=>inYear(c)&&!isSun(c));
  else cs=D.cases.filter(c=>inYear(c)||closedYr(c)); // 전체 = 올해 수임 + 올해 종결
  if(q)cs=cs.filter(c=>(c.client+c.cn+c.ins+c.region).toLowerCase().includes(q.toLowerCase()));
  return sortBy(cs);
}

function refBreakdown(){

      m[t]=m[t]||{net:0,g:{}};

function efToObj(){

  else cls='';

function splitInterim(id){
  if(!id){alert('먼저 저장된 사건을 열어 사용하세요.');return;}
  if(!confirm('이번에 입력한 내용을 「중간지급분(종결)」으로 확정하고, 같은 계약번호의 「잔여분(검토중)」 줄을 새로 만듭니다.\\n두 줄은 같은 No.·1건으로 묶입니다. 진행할까요?'))return;
  const obj=efToObj();
  const c=D.cases.find(x=>x.id===id);
  Object.assign(c,obj);
  const gid=c.gid||('g'+Date.now());
  c.gid=gid; c.interim=true;
  if(!isD(c.cls))c.cls=new Date().toISOString().slice(0,10); // 종결일 없으면 오늘
  // 잔여분 레코드 생성
  const B=JSON.parse(JSON.stringify(c));
  B.id='c'+Date.now(); B.gid=gid; B.interim=false; B.cls='';
  B.pay=0; B.fee=0; B.vat=0; B.ref=0; B.out=0; B.cost=0;
  const idx=D.cases.findIndex(x=>x.id===id);
  D.cases.splice(idx+1,0,B);
  save();render();
  openCase(B.id); // 잔여분 입력 화면 열기
}
function delCase(id){if(!confirm('이 사건을 삭제할까요?'))return;D.cases=D.cases.filter(x=>x.id!==id);save();closeModal();render();}
function closeModal(){document.getElementById('overlay').style.display='none';}
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

function setTab(t){tab=t;document.getElementById('secnav').style.display=t==='list'?'flex':'none';render();}
function setFilt(f){filt=f;render();}

// ── Google Drive 연동 ──
const GD_CID='505763803094-8ej5ued2e8b5qe8v8k6ocphqnmm42o35.apps.googleusercontent.com';
const GD_SCOPE='https://www.googleapis.com/auth/drive.file';
const GD_FILE='theham-cases-data.json';
let gdc=null,gdtok=null,gdpend=null;
function gdSt(t,col='#8593b0'){const el=document.getElementById('gdst');if(el){el.textContent=t;el.style.color=col;}}
function gdStoreToken(token,exp){try{localStorage.setItem('gdc_token',token);localStorage.setItem('gdc_expiry',(Date.now()+((exp||3600)*1000)).toString());localStorage.setItem('gdc_authed','1');}catch(e){}}
function gdCachedToken(){try{const t=localStorage.getItem('gdc_token'),e=parseInt(localStorage.getItem('gdc_expiry')||'0');if(t&&Date.now()<e-120000)return t;}catch(e){}return null;}
function gdReady(){
  try{
    gdc=google.accounts.oauth2.initTokenClient({client_id:GD_CID,scope:GD_SCOPE,callback:async r=>{
      if(r.error){gdpend=null;gdSt('☁ 드라이브: 📤 저장으로 로그인');return;}
      gdtok=r.access_token;gdStoreToken(r.access_token,r.expires_in);
      if(gdpend==='save'){gdpend=null;await gdDoSave();}
      else if(gdpend==='load'){gdpend=null;await gdDoLoad();}
      else{await gdDoLoad();}
    }});
    const c=gdCachedToken();
    if(c){gdtok=c;gdSt('✅ 자동저장 활성화','#16a34a');setTimeout(()=>gdDoLoad(),400);}
    else if(localStorage.getItem('gdc_authed')){gdSt('드라이브 재연결 중...');setTimeout(()=>{try{gdc.requestAccessToken({prompt:''});}catch(e){gdSt('☁ 드라이브: 📤 저장으로 로그인');}},700);}
    else gdSt('☁ 드라이브: 📤 저장으로 로그인');
  }catch(e){gdSt('⚠️ 드라이브 사용 불가','#f97316');}
}
async function gdH(url,opt={}){return fetch(url,{...opt,headers:{Authorization:`Bearer ${gdtok}`,...(opt.headers||{})}});}
async function gdFindId(){const r=await gdH(`https://www.googleapis.com/drive/v3/files?q=name='${GD_FILE}' and trashed=false&fields=files(id)`);const d=await r.json();return d.files?.[0]?.id||null;}
async function gdDoSave(silent){
  if(!silent)gdSt('💾 저장 중...','#c9a84c');
  try{
    const body=JSON.stringify(D);const fid=await gdFindId();
    if(fid)await gdH(`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=media`,{method:'PATCH',headers:{'Content-Type':'application/json'},body});
    else{const fm=new FormData();fm.append('metadata',new Blob([JSON.stringify({name:GD_FILE,mimeType:'application/json'})],{type:'application/json'}));fm.append('file',new Blob([body],{type:'application/json'}));await gdH('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',body:fm});}
    const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});gdSt(`✅ 저장 완료 ${t}`,'#16a34a');
  }catch(e){gdSt('❌ 저장 실패','#dc2626');}
}
async function gdDoLoad(){
  gdSt('📥 불러오는 중...','#c9a84c');
  try{
    const fid=await gdFindId();
    if(!fid){gdSt('⚠️ 드라이브에 저장본 없음 (먼저 저장)','#f97316');return;}
    const r=await gdH(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`);
    const loaded=await r.json();
    if(loaded&&loaded.cases){D=loaded;initYear();gdSkipSave=true;save();gdSkipSave=false;render();}
    const t=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});gdSt(`✅ 불러오기 완료 ${t}`,'#16a34a');
  }catch(e){gdSt('❌ 불러오기 실패','#dc2626');}
}
function gdAuth(next){if(!gdc){gdSt('⚠️ GIS 미로드 - 인터넷 확인','#f97316');return;}if(!gdtok){gdpend=next;gdc.requestAccessToken({prompt:''});}else{next==='save'?gdDoSave():gdDoLoad();}}

// ── 초기화 ──
load();initYear();render();
</script>
